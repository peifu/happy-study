
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快乐学习 - 百科知识学习系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/common.css">
    <style>
        /* Concept card styles */
        .concept-card {
            background: var(--card-bg-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid var(--border-card);
        }

        .concept-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .concept-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(155, 89, 182, 0.1) 0%, transparent 70%);
            transform: rotate(30deg);
            z-index: 0;
        }

        .concept-header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
            gap: 15px;
        }

        .concept {
            font-size: 36px;
            font-weight: 700;
            color: var(--science);
            text-shadow: 0 0 10px rgba(155, 89, 182, 0.3);
        }

        .speak-btn-icon {
            background: linear-gradient(90deg, var(--science), var(--primary));
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .speak-btn-icon:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(155, 89, 182, 0.5);
        }

        .speak-btn-icon i {
            font-size: 20px;
        }

        .category {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            background: rgba(155, 89, 182, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
        }

        .explanation {
            font-size: 20px;
            margin-bottom: 25px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .example {
            font-style: italic;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
            border-left: 3px solid var(--science);
            padding-left: 15px;
            font-size: 16px;
        }

        /* Card controls override - science keeps controls in a single row */
        .card-controls {
            flex-wrap: nowrap;
            width: 100%;
        }

        /* Space simulation styles */
        .space-simulation-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            align-items: flex-start;
        }

        .canvas-container {
            flex: 1;
            position: relative;
            background: #000a1f;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-card);
        }

        .square-canvas {
            width: 100%;
            height: 0;
            padding-bottom: 80%;
            position: relative;
        }

        #solarSystem {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000a1f;
        }

        .controls-panel {
            width: 300px;
            background: var(--card-bg-color);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-card);
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        /* Science-themed switch color */
        input:checked + .slider-round {
            background-color: var(--science);
        }

        /* Responsive - page-specific elements only */
        @media (max-width: 1200px) {
            .concept-card {
                min-height: 350px;
                padding: 25px;
            }
        }

        @media (max-width: 1000px) {
            .concept-card {
                min-height: 320px;
                padding: 20px;
            }
            .concept {
                font-size: 32px;
            }
            .explanation {
                font-size: 18px;
            }
            .example {
                font-size: 15px;
            }
            .space-simulation-container {
                flex-direction: column;
            }
            .controls-panel {
                width: 100%;
            }
            .square-canvas {
                padding-bottom: 80%;
            }
        }

        @media (max-width: 800px) {
            .concept-card {
                min-height: 300px;
                padding: 18px;
            }
            .concept {
                font-size: 28px;
            }
            .explanation {
                font-size: 17px;
                margin-bottom: 20px;
            }
            .example {
                font-size: 14px;
                margin-bottom: 20px;
            }
            .card-controls {
                flex-wrap: wrap;
                gap: 10px;
            }
        }

        @media (max-width: 600px) {
            .concept-card {
                min-height: 280px;
                padding: 15px;
            }
            .concept {
                font-size: 26px;
            }
            .explanation {
                font-size: 16px;
            }
            .example {
                font-size: 13px;
            }
            .concept-header {
                flex-direction: column;
                gap: 10px;
            }
            .card-controls {
                flex-direction: column;
                gap: 10px;
            }
        }

        @media (max-width: 400px) {
            .concept-card {
                min-height: 250px;
                padding: 12px;
            }
            .concept {
                font-size: 24px;
            }
            .explanation {
                font-size: 15px;
            }
            .example {
                font-size: 12px;
            }
        }
        /* 生肖卡片样式 */
        .zodiac-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .zodiac-card {
            background: var(--card-bg-color);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid var(--border-card);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .zodiac-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .zodiac-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .zodiac-emoji {
            font-size: 40px;
        }

        .zodiac-name {
            font-size: 22px;
            font-weight: 700;
        }

        .zodiac-rank {
            margin-left: auto;
            background: rgba(155, 89, 182, 0.15);
            color: var(--science);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .zodiac-title {
            font-size: 14px;
            color: var(--science);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .zodiac-trait {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            line-height: 1.6;
        }

        .zodiac-story {
            font-size: 13px;
            color: var(--text-color);
            background: rgba(0, 0, 0, 0.05);
            border-radius: 8px;
            padding: 12px;
            line-height: 1.6;
            border-left: 3px solid var(--science);
        }

        .zodiac-detail-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .zodiac-detail-emoji {
            font-size: 80px;
            display: block;
            margin-bottom: 10px;
        }

        .zodiac-detail-name {
            font-size: 32px;
            font-weight: 700;
            color: var(--science);
        }

        .zodiac-detail-title {
            font-size: 16px;
            color: var(--text-secondary);
        }

        .zodiac-back-btn {
            margin-bottom: 20px;
        }

        .zodiac-rule-block {
            background: var(--card-bg-color);
            border-radius: 12px;
            padding: 20px 25px;
            margin-bottom: 16px;
            border: 1px solid var(--border-card);
        }

        .zodiac-rule-heading {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--science);
        }

        .zodiac-rule-heading .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        .zodiac-rule-text {
            color: var(--text-color);
            font-size: 15px;
            line-height: 1.8;
        }

        @media (max-width: 600px) {
            .zodiac-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

    <link rel="stylesheet" href="assets/css/learning-assistant.css">
    <script src="assets/js/learning-assistant.js"></script>
    <script src="assets/js/common.js"></script>
</head>

<body>
    <div class="container">
        <!-- 科学概念页面 -->
        <div class="page active" id="conceptPage">
            <div class="main-content">
                <div class="concept-card">
                    <div class="concept-header">
                        <div class="concept" id="currentConcept">加载中...</div>
                        <button class="speak-btn-icon" id="speakBtn">
                            <i class="fas fa-volume-up"></i>
                        </button>
                    </div>
                    <div class="category" id="currentCategory">科学</div>
                    <div class="explanation" id="currentExplanation">加载科学概念数据中</div>
                    <div class="example" id="currentExample">请稍候，正在加载科学知识数据。</div>

                    <div class="card-controls">
                        <button class="btn btn-primary" id="prevBtn" disabled>
                            <i class="fas fa-arrow-left"></i>
                            <span>上一个</span>
                        </button>
                        <button class="btn btn-success" id="knowBtn" disabled>
                            <i class="fas fa-check"></i>
                            <span>理解</span>
                        </button>
                        <button class="btn btn-warning" id="notKnowBtn" disabled>
                            <i class="fas fa-times"></i>
                            <span>不理解</span>
                        </button>
                        <button class="btn btn-primary" id="nextBtn" disabled>
                            <span>下一个</span>
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>

                <div class="progress-container">
                    <div class="progress-title">
                        <i class="fas fa-chart-line"></i>
                        <span>学习进度</span>
                    </div>
                    <div class="stats">
                        <div class="stat-card">
                            <div class="stat-value" id="totalCount">0</div>
                            <div class="stat-label">概念总数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="learnedCount">0</div>
                            <div class="stat-label">已学概念</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="masteredCount">0</div>
                            <div class="stat-label">已掌握</div>
                        </div>
                    </div>

                    <div class="progress-bar-container">
                        <div class="progress-info">
                            <span>学习进度</span>
                            <span id="progressPercentage">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                    </div>

                    <div class="progress-title">
                        <i class="fas fa-book"></i>
                        <span>当前科学主题</span>
                    </div>

                    <select class="form-control" id="topicSelector">
                        <option value="physics">物理科学</option>
                        <option value="chemistry">化学</option>
                        <option value="biology">生物科学</option>
                        <option value="earth">地球科学</option>
                        <option value="space">太空科学</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 模拟太空页面 -->
        <div class="page" id="spacePage">
            <div class="space-simulation-container">
                <div class="canvas-container">
                    <div class="square-canvas">
                        <canvas id="solarSystem"></canvas>
                    </div>
                </div>

                <div class="controls-panel">
                    <div class="control-group">
                        <div class="control-label">模拟控制</div>
                        <div class="control-row">
                            <button id="pauseBtn" class="btn btn-primary" style="flex: 1;">
                                <i class="fas fa-pause"></i>
                                <span>暂停</span>
                            </button>
                            <button id="resetBtn" class="btn btn-success" style="flex: 1;">
                                <i class="fas fa-refresh"></i>
                                <span>重置</span>
                            </button>
                        </div>
                        <div class="control-row">
                            <button id="fullscreenBtn" class="btn btn-warning" style="flex: 1;">
                                <i class="fa fa-expand"></i>
                                <span>全屏</span>
                            </button>
                        </div>
                    </div>

                    <div class="control-group">
                        <div class="control-label">模拟速度</div>
                        <div class="control-row">
                            <input type="range" id="speedRange" min="0.1" max="5" step="0.1" value="1"
                                style="flex: 1;">
                            <span id="speedValue" style="min-width: 40px; text-align: center;">1x</span>
                        </div>
                    </div>

                    <div class="control-group">
                        <div class="control-label">缩放级别</div>
                        <div class="control-row">
                            <input type="range" id="zoomRange" min="0.5" max="2" step="0.1" value="1"
                                style="flex: 1;">
                            <span id="zoomValue" style="min-width: 40px; text-align: center;">1x</span>
                        </div>
                    </div>

                    <div class="control-group">
                        <div class="control-label">显示选项</div>
                        <div class="control-row">
                            <label for="labelsToggle" style="flex: 1;">显示标签</label>
                            <label class="switch">
                                <input type="checkbox" id="labelsToggle" checked>
                                <span class="slider-round"></span>
                            </label>
                        </div>
                    </div>

                    <div class="control-group">
                        <div class="control-label">天体信息</div>
                        <div style="font-size: 12px; color: var(--text-secondary); line-height: 1.4;">
                            点击太阳系中的天体查看详细信息。当前显示太阳系八大行星及其主要卫星的轨道运动。
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 生活常识页面 - 十二生肖 -->
        <div class="page" id="zodiacPage">
            <div class="main-content">
                <div class="concept-card" id="zodiacCard">
                    <div id="zodiacGrid">
                        <!-- 生肖卡片网格 -->
                    </div>
                </div>

                <div class="progress-container" id="zodiacSidebar">
                    <div class="progress-title">
                        <i class="fas fa-paw"></i>
                        <span>十二生肖</span>
                    </div>
                    <div style="color:var(--text-secondary);font-size:14px;margin-bottom:15px;">
                        点击卡片查看每个生肖的趣味故事
                    </div>
                    <div class="progress-title">
                        <i class="fas fa-lightbulb"></i>
                        <span>顺序口诀</span>
                    </div>
                    <div style="color:var(--text-secondary);font-size:13px;line-height:1.8;">
                        鼠、牛、虎、兔、龙、蛇、马、羊、猴、鸡、狗、猪<br><br>
                        小老鼠，打头来，牛把蹄儿抬。<br>
                        老虎回头一声吼，兔儿跳得快。<br>
                        龙和蛇，尾巴甩，马羊步儿迈。<br>
                        小猴机灵蹦又跳，鸡唱天下白。<br>
                        狗儿跳，猪儿叫，老鼠又跟来。
                    </div>
                </div>
            </div>
        </div>

        <!-- 生肖详情页面 -->
        <div class="page" id="zodiacDetailPage">
            <div class="main-content">
                <div class="concept-card" id="zodiacDetailCard">
                    <!-- 动态渲染 -->
                </div>
                <div class="progress-container">
                    <div class="progress-title">
                        <i class="fas fa-info-circle"></i>
                        <span>生肖详情</span>
                    </div>
                    <div id="zodiacDetailInfo" style="font-size:14px;color:var(--text-secondary);line-height:1.8;">
                    </div>
                    <div style="margin-top:16px;">
                        <button class="btn btn-primary" id="zodiacBackBtn" style="width:100%;">
                            <i class="fas fa-arrow-left"></i>
                            <span>返回生肖列表</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 设置页面 -->
        <div class="page" id="settingsPage">
            <h2>系统设置</h2>

            <div class="settings-grid">
                <div class="settings-card">
                    <div class="settings-header">
                        <i class="fas fa-book settings-icon"></i>
                        <div class="settings-title">学习设置</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">默认科学主题</label>
                        <select class="form-control" id="defaultTopic">
                            <option value="physics">物理科学</option>
                            <option value="chemistry">化学</option>
                            <option value="biology">生物科学</option>
                            <option value="earth">地球科学</option>
                            <option value="space">太空科学</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">新概念每日数量</label>
                        <input type="range" min="5" max="20" value="10" class="range-slider" id="dailyConceptsSlider">
                        <div class="slider-value" id="dailyConceptsValue">10 个</div>
                    </div>
                </div>

                <div class="settings-card">
                    <div class="settings-header">
                        <i class="fas fa-database settings-icon"></i>
                        <div class="settings-title">数据管理</div>
                    </div>

                    <div class="form-group">
                        <button class="btn btn-primary" style="width: 100%; margin-bottom: 15px;">
                            <i class="fas fa-download"></i>
                            <span>导出学习数据</span>
                        </button>

                        <button class="btn btn-secondary" style="width: 100%; margin-bottom: 15px;">
                            <i class="fas fa-upload"></i>
                            <span>导入学习数据</span>
                        </button>

                        <button class="btn btn-warning" style="width: 100%;">
                            <i class="fas fa-trash"></i>
                            <span>重置学习进度</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 导航配置
        const NAV_CONFIG = [
            { page: 'concept',  icon: 'fa-flask', label: '科学概念', active: true },
            { page: 'zodiac',   icon: 'fa-paw',   label: '生活常识', active: false },
            { page: 'space',    icon: 'fa-rocket', label: '模拟太空', active: false },
        ];

        // 数据缓存
        let zodiacAnimals = [];
        let zodiacRhyme = '鼠牛虎兔龙蛇马，羊猴鸡狗猪一家。十二生肖轮流转，中华文化传天下！';
        let scienceConcepts = {};

        // 从JSON加载数据
        async function loadZodiacData() {
            if (zodiacAnimals.length) return zodiacAnimals;
            try {
                const resp = await fetch('data/baike/zodiac-animals.json');
                zodiacAnimals = await resp.json();
                return zodiacAnimals;
            } catch (e) {
                console.error('加载生肖数据失败:', e);
                return [];
            }
        }

        async function loadScienceData() {
            if (Object.keys(scienceConcepts).length) return scienceConcepts;
            try {
                const resp = await fetch('data/baike/science-concepts.json');
                scienceConcepts = await resp.json();
                return scienceConcepts;
            } catch (e) {
                console.error('加载科学概念数据失败:', e);
                return {};
            }
        }

        let currentTopic = 'physics';
        let currentIndex = 0;
        let learnedConcepts = {};
        let masteredConcepts = {};

        // DOM元素
        const currentConceptElement = document.getElementById('currentConcept');
        const currentCategoryElement = document.getElementById('currentCategory');
        const currentExplanationElement = document.getElementById('currentExplanation');
        const currentExampleElement = document.getElementById('currentExample');
        const topicSelectorElement = document.getElementById('topicSelector');
        const speakBtnElement = document.getElementById('speakBtn');
        const knowBtnElement = document.getElementById('knowBtn');
        const notKnowBtnElement = document.getElementById('notKnowBtn');
        const nextBtnElement = document.getElementById('nextBtn');
        const prevBtnElement = document.getElementById('prevBtn');
        const totalCountElement = document.getElementById('totalCount');
        const learnedCountElement = document.getElementById('learnedCount');
        const masteredCountElement = document.getElementById('masteredCount');
        const progressFillElement = document.getElementById('progressFill');
        const progressPercentageElement = document.getElementById('progressPercentage');
        let navLinks, pages;

        // 渲染生肖卡片网格
        async function renderZodiacGrid() {
            const grid = document.getElementById('zodiacGrid');
            if (!grid) return;
            const animals = await loadZodiacData();
            grid.innerHTML = animals.map(a => `
                <div class="zodiac-card" onclick="showZodiacDetail('${a.id}')">
                    <div class="zodiac-card-header">
                        <span class="zodiac-emoji">${a.emoji}</span>
                        <span class="zodiac-name">${a.name}</span>
                        <span class="zodiac-rank">第${a.rank}名</span>
                    </div>
                    <div class="zodiac-title">${a.title}</div>
                    <div class="zodiac-trait">${a.trait}</div>
                    <div class="zodiac-story">${a.story.substring(0, 80)}...</div>
                </div>
            `).join('');
        }

        // 显示生肖详情
        async function showZodiacDetail(id) {
            await loadZodiacData();
            const animal = zodiacAnimals.find(a => a.id === id);
            if (!animal) return;

            switchPageCommon('zodiacDetail', document.querySelectorAll('.nav-link'),
                document.querySelectorAll('.page'));

            document.getElementById('zodiacDetailCard').innerHTML = `
                <div class="zodiac-detail-header">
                    <span class="zodiac-detail-emoji">${animal.emoji}</span>
                    <div class="zodiac-detail-name">${animal.name} — ${animal.title}</div>
                    <div class="zodiac-detail-title">十二生肖第 ${animal.rank} 名</div>
                </div>
                <div class="zodiac-rule-block">
                    <div class="zodiac-rule-heading">
                        <span class="dot" style="background:var(--science)"></span>
                        性格特点
                    </div>
                    <div class="zodiac-rule-text">${animal.trait}</div>
                </div>
                <div class="zodiac-rule-block">
                    <div class="zodiac-rule-heading">
                        <span class="dot" style="background:var(--science)"></span>
                        生肖故事
                    </div>
                    <div class="zodiac-rule-text">${animal.story}</div>
                </div>
                <div class="zodiac-rule-block">
                    <div class="zodiac-rule-heading">
                        <span class="dot" style="background:var(--science)"></span>
                        小知识
                    </div>
                    <div class="zodiac-rule-text">${animal.detail}</div>
                </div>
            `;

            document.getElementById('zodiacDetailInfo').innerHTML = `
                <div style="text-align:center;font-size:40px;margin-bottom:8px;">${animal.emoji}</div>
                <div style="text-align:center;font-weight:700;font-size:18px;color:var(--science);margin-bottom:12px;">${animal.name} — 第${animal.rank}名</div>
                <div>${zodiacRhyme}</div>
            `;
        }

        // 返回生肖列表
        function backToZodiacGrid() {
            switchPageCommon('zodiac', document.querySelectorAll('.nav-link'),
                document.querySelectorAll('.page'));
        }

        // 初始化
        async function init() {
            navLinks = document.querySelectorAll('.nav-link');
            pages = document.querySelectorAll('.page');
            syncThemeFromIndex();
            loadProgress();
            await loadScienceData();
            showCurrentConcept();
            updateProgress();
            renderZodiacGrid();
            setupEventListeners();
        }

        // 设置事件监听
        function setupEventListeners() {
            // 导航链接
            setupNavLinks(navLinks, pages, (pageId) => {
                if (pageId === 'zodiac') renderZodiacGrid();
                if (pageId === 'space') setTimeout(() => window.resizeSolarCanvas(), 50);
            });

            // 主题选择
            topicSelectorElement.addEventListener('change', handleTopicChange);

            // 控制按钮
            speakBtnElement.addEventListener('click', speakCurrentConcept);
            knowBtnElement.addEventListener('click', markAsKnown);
            notKnowBtnElement.addEventListener('click', markAsUnknown);
            nextBtnElement.addEventListener('click', showNextConcept);
            prevBtnElement.addEventListener('click', showPrevConcept);

            // 生肖返回按钮
            const backBtn = document.getElementById('zodiacBackBtn');
            if (backBtn) {
                backBtn.addEventListener('click', backToZodiacGrid);
            }
        }

        // 显示当前概念
        async function showCurrentConcept() {
            await loadScienceData();
            const concepts = scienceConcepts[currentTopic];
            if (!concepts || concepts.length === 0) {
                currentConceptElement.textContent = "无数据";
                currentCategoryElement.textContent = "科学";
                currentExplanationElement.textContent = "当前主题没有数据";
                currentExampleElement.textContent = "请选择其他科学主题";
                return;
            }

            const conceptData = concepts[currentIndex];
            currentConceptElement.textContent = conceptData.concept;
            currentCategoryElement.textContent = conceptData.category;
            currentExplanationElement.textContent = conceptData.explanation;
            currentExampleElement.textContent = conceptData.example;

            // 启用按钮
            speakBtnElement.disabled = false;
            knowBtnElement.disabled = false;
            notKnowBtnElement.disabled = false;
            nextBtnElement.disabled = false;
            prevBtnElement.disabled = false;
        }

        // 朗读当前概念
        function speakCurrentConcept() {
            const concepts = scienceConcepts[currentTopic];
            if (!concepts || concepts.length === 0) return;

            const concept = concepts[currentIndex].concept;
            const explanation = concepts[currentIndex].explanation;
            const text = `${concept}。${explanation}`;

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.9;

            speechSynthesis.cancel();
            speechSynthesis.speak(utterance);
        }

        // 标记为理解
        function markAsKnown() {
            const concepts = scienceConcepts[currentTopic];
            if (!concepts || concepts.length === 0) return;

            const concept = concepts[currentIndex].concept;
            if (!learnedConcepts[currentTopic]) learnedConcepts[currentTopic] = {};
            if (!masteredConcepts[currentTopic]) masteredConcepts[currentTopic] = {};

            learnedConcepts[currentTopic][concept] = true;
            masteredConcepts[currentTopic][concept] = true;
            saveProgress();
            updateProgress();
            showNextConcept();
        }

        // 标记为不理解
        function markAsUnknown() {
            const concepts = scienceConcepts[currentTopic];
            if (!concepts || concepts.length === 0) return;

            const concept = concepts[currentIndex].concept;
            if (!learnedConcepts[currentTopic]) learnedConcepts[currentTopic] = {};
            if (!masteredConcepts[currentTopic]) masteredConcepts[currentTopic] = {};

            learnedConcepts[currentTopic][concept] = true;
            masteredConcepts[currentTopic][concept] = false;
            saveProgress();
            updateProgress();
            showNextConcept();
        }

        // 显示下一个概念
        function showNextConcept() {
            const concepts = scienceConcepts[currentTopic];
            if (!concepts || concepts.length === 0) return;

            currentIndex = (currentIndex + 1) % concepts.length;
            showCurrentConcept();
        }

        // 显示上一个概念
        function showPrevConcept() {
            const concepts = scienceConcepts[currentTopic];
            if (!concepts || concepts.length === 0) return;

            currentIndex = (currentIndex - 1 + concepts.length) % concepts.length;
            showCurrentConcept();
        }

        // 处理主题变更
        function handleTopicChange() {
            currentTopic = topicSelectorElement.value;
            currentIndex = 0;
            showCurrentConcept();
            updateProgress();
        }

        // 更新进度显示
        function updateProgress() {
            const concepts = scienceConcepts[currentTopic];
            if (!concepts || concepts.length === 0) {
                totalCountElement.textContent = "0";
                learnedCountElement.textContent = "0";
                masteredCountElement.textContent = "0";
                progressFillElement.style.width = "0%";
                progressPercentageElement.textContent = "0%";
                return;
            }

            const total = concepts.length;
            const learned = learnedConcepts[currentTopic] ? Object.keys(learnedConcepts[currentTopic]).length : 0;
            const mastered = masteredConcepts[currentTopic] ? Object.keys(masteredConcepts[currentTopic]).filter(
                concept => masteredConcepts[currentTopic][concept]
            ).length : 0;

            totalCountElement.textContent = total;
            learnedCountElement.textContent = learned;
            masteredCountElement.textContent = mastered;

            const progress = total > 0 ? (learned / total) * 100 : 0;
            progressFillElement.style.width = `${progress}%`;
            progressPercentageElement.textContent = `${Math.round(progress)}%`;
        }

        // 保存进度
        function saveProgress() {
            localStorage.setItem('baikeLearnedConcepts', JSON.stringify(learnedConcepts));
            localStorage.setItem('baikeMasteredConcepts', JSON.stringify(masteredConcepts));
        }

        // 加载进度
        function loadProgress() {
            const learned = localStorage.getItem('baikeLearnedConcepts');
            const mastered = localStorage.getItem('baikeMasteredConcepts');

            if (learned) {
                learnedConcepts = JSON.parse(learned);
            }
            if (mastered) {
                masteredConcepts = JSON.parse(mastered);
            }
        }

        // 初始化应用
        (function() {
            injectNav(NAV_CONFIG);
            injectFooter();
            injectAssistant();
            setupHomeLink('homeLink', 'index.html');
            initLearningAssistant();
            init();
        })();

        // 太阳系模拟器脚本
        (function() {
            // 获取Canvas元素并设置上下文
            const canvas = document.getElementById('solarSystem');
            const ctx = canvas.getContext('2d');

            // 设置Canvas尺寸 - 适应正方形容器
            function resizeCanvas() {
                const container = document.querySelector('.square-canvas');
                const size = container.clientWidth;
                canvas.width = size;
                canvas.height = size*0.8;
            }

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            window.resizeSolarCanvas = resizeCanvas;

            // 天体数据
            const celestialBodies = [
                { name: "太阳", radius: 30, color: "#ff7d00", orbitRadius: 0, orbitSpeed: 0, angle: 0, tilt: 0 },
                { name: "水星", radius: 4, color: "#a8a8a8", orbitRadius: 70, orbitSpeed: 0.04, angle: 0, tilt: 0 },
                { name: "金星", radius: 7, color: "#e39e58", orbitRadius: 100, orbitSpeed: 0.015, angle: 0, tilt: 0 },
                { name: "地球", radius: 7.5, color: "#2e86c1", orbitRadius: 140, orbitSpeed: 0.01, angle: 0, tilt: 23.5 },
                { name: "月球", radius: 2, color: "#d0d0d0", orbitRadius: 20, orbitSpeed: 0.05, angle: 0, tilt: 0, parent: 3 },
                { name: "火星", radius: 5, color: "#e74c3c", orbitRadius: 180, orbitSpeed: 0.008, angle: 0, tilt: 0 },
                { name: "木星", radius: 20, color: "#f39c12", orbitRadius: 230, orbitSpeed: 0.002, angle: 0, tilt: 3 },
                { name: "土星", radius: 16, color: "#f1c40f", orbitRadius: 300, orbitSpeed: 0.0009, angle: 0, tilt: 26.7, ring: { innerRadius: 20, outerRadius: 30, color: "#d4ac0d" } },
                { name: "天王星", radius: 12, color: "#3498db", orbitRadius: 350, orbitSpeed: 0.0004, angle: 0, tilt: 97.8 },
                { name: "海王星", radius: 11, color: "#2980b9", orbitRadius: 400, orbitSpeed: 0.0001, angle: 0, tilt: 28.3 }
            ];

            // 动画控制变量
            let isPaused = false;
            let animationSpeed = 1;
            let zoomLevel = 1;
            let showLabels = true;

            // 计算中心坐标
            function getCenter() {
                return {
                    x: canvas.width / 2,
                    y: canvas.height / 2
                };
            }

            // 绘制天体轨道
            function drawOrbit(orbitRadius, center) {
                ctx.beginPath();
                ctx.arc(center.x, center.y, orbitRadius, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // 绘制天体
            function drawCelestialBody(body, center) {
                // 计算天体位置
                let x, y;
                if (body.orbitRadius === 0) {
                    x = center.x;
                    y = center.y;
                } else {
                    const parent = body.parent !== undefined ? celestialBodies[body.parent] : null;
                    const parentX = parent ? parent.x : center.x;
                    const parentY = parent ? parent.y : center.y;

                    x = parentX + Math.cos(body.angle) * body.orbitRadius * zoomLevel;
                    y = parentY + Math.sin(body.angle) * body.orbitRadius * zoomLevel;

                    body.x = x;
                    body.y = y;
                }

                if (body.orbitRadius > 0) {
                    const orbitCenter = body.parent !== undefined
                        ? { x: celestialBodies[body.parent].x, y: celestialBodies[body.parent].y }
                        : center;
                    drawOrbit(body.orbitRadius * zoomLevel, orbitCenter);
                }

                if (body.ring) {
                    ctx.beginPath();
                    ctx.ellipse(x, y, body.ring.outerRadius * zoomLevel, body.ring.innerRadius * zoomLevel,
                        body.tilt * Math.PI / 180, 0, Math.PI * 2);
                    ctx.strokeStyle = body.ring.color;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                ctx.beginPath();
                ctx.arc(x, y, body.radius * zoomLevel, 0, Math.PI * 2);

                const gradient = ctx.createRadialGradient(
                    x - body.radius * zoomLevel * 0.3, y - body.radius * zoomLevel * 0.3, 0,
                    x, y, body.radius * zoomLevel
                );

                if (body.name === "太阳") {
                    gradient.addColorStop(0, "#fffacd");
                    gradient.addColorStop(0.5, body.color);
                    gradient.addColorStop(1, "#ff4500");
                } else {
                    gradient.addColorStop(0, body.color);
                    gradient.addColorStop(1, darkenColor(body.color, 0.7));
                }

                ctx.fillStyle = gradient;
                ctx.fill();

                if (body.name === "太阳") {
                    ctx.shadowColor = body.color;
                    ctx.shadowBlur = 20 * zoomLevel;
                    ctx.beginPath();
                    ctx.arc(x, y, body.radius * zoomLevel, 0, Math.PI * 2);
                    ctx.fillStyle = body.color + "40";
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                if (showLabels) {
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold ' + Math.max(8, 12 * zoomLevel) + 'px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(body.name, x, y - body.radius * zoomLevel - 5);
                }
            }

            function darkenColor(color, amount) {
                if (color.startsWith('#')) {
                    let r = parseInt(color.substr(1, 2), 16);
                    let g = parseInt(color.substr(3, 2), 16);
                    let b = parseInt(color.substr(5, 2), 16);

                    r = Math.max(0, Math.floor(r * amount));
                    g = Math.max(0, Math.floor(g * amount));
                    b = Math.max(0, Math.floor(b * amount));

                    return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
                }
                return color;
            }

            function animate() {
                if (!isPaused) {
                    celestialBodies.forEach(body => {
                        body.angle += body.orbitSpeed * animationSpeed;
                    });
                }

                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const center = getCenter();

                celestialBodies.forEach(body => {
                    drawCelestialBody(body, center);
                });

                requestAnimationFrame(animate);
            }

            animate();

            document.getElementById('pauseBtn').addEventListener('click', function() {
                isPaused = !isPaused;
                this.innerHTML = isPaused ? '<i class="fas fa-play"></i><span>继续</span>' : '<i class="fas fa-pause"></i><span>暂停</span>';
            });

            document.getElementById('resetBtn').addEventListener('click', function() {
                celestialBodies.forEach(body => {
                    body.angle = 0;
                });
            });

            document.getElementById('fullscreenBtn').addEventListener('click', function() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        alert(`全屏请求出错: ${err.message}`);
                    });
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                }
            });

            const speedRange = document.getElementById('speedRange');
            const speedValue = document.getElementById('speedValue');
            speedRange.addEventListener('input', function() {
                animationSpeed = parseFloat(this.value);
                speedValue.textContent = animationSpeed.toFixed(1) + 'x';
            });

            const zoomRange = document.getElementById('zoomRange');
            const zoomValue = document.getElementById('zoomValue');
            zoomRange.addEventListener('input', function() {
                zoomLevel = parseFloat(this.value);
                zoomValue.textContent = zoomLevel.toFixed(1) + 'x';
            });

            document.getElementById('labelsToggle').addEventListener('change', function() {
                showLabels = this.checked;
            });
        })();
    </script>
</body>
