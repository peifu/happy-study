
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快乐学习 - 百科知识学习系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/common.css">
    <style>
        /* Concept card styles */
        .concept-card {
            background: var(--card-bg-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid var(--border-card);
        }

        .concept-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .concept-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(155, 89, 182, 0.1) 0%, transparent 70%);
            transform: rotate(30deg);
            z-index: 0;
        }

        .concept-header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
            gap: 15px;
        }

        .concept {
            font-size: 36px;
            font-weight: 700;
            color: var(--science);
            text-shadow: 0 0 10px rgba(155, 89, 182, 0.3);
        }

        .speak-btn-icon {
            background: linear-gradient(90deg, var(--science), var(--primary));
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .speak-btn-icon:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(155, 89, 182, 0.5);
        }

        .speak-btn-icon i {
            font-size: 20px;
        }

        .category {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            background: rgba(155, 89, 182, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
        }

        .explanation {
            font-size: 20px;
            margin-bottom: 25px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .example {
            font-style: italic;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
            border-left: 3px solid var(--science);
            padding-left: 15px;
            font-size: 16px;
        }

        /* Card controls override - science keeps controls in a single row */
        .card-controls {
            flex-wrap: nowrap;
            width: 100%;
        }

        /* Space simulation styles */
        .space-simulation-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            align-items: flex-start;
        }

        .canvas-container {
            flex: 1;
            position: relative;
            background: #000a1f;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-card);
        }

        .square-canvas {
            width: 100%;
            height: 0;
            padding-bottom: 80%;
            position: relative;
        }

        #solarSystem {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000a1f;
        }

        .controls-panel {
            width: 300px;
            background: var(--card-bg-color);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-card);
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        /* Science-themed switch color */
        input:checked + .slider-round {
            background-color: var(--science);
        }

        /* Responsive - page-specific elements only */
        @media (max-width: 1200px) {
            .concept-card {
                min-height: 350px;
                padding: 25px;
            }
        }

        @media (max-width: 1000px) {
            .concept-card {
                min-height: 320px;
                padding: 20px;
            }
            .concept {
                font-size: 32px;
            }
            .explanation {
                font-size: 18px;
            }
            .example {
                font-size: 15px;
            }
            .space-simulation-container {
                flex-direction: column;
            }
            .controls-panel {
                width: 100%;
            }
            .square-canvas {
                padding-bottom: 80%;
            }
        }

        @media (max-width: 800px) {
            .concept-card {
                min-height: 300px;
                padding: 18px;
            }
            .concept {
                font-size: 28px;
            }
            .explanation {
                font-size: 17px;
                margin-bottom: 20px;
            }
            .example {
                font-size: 14px;
                margin-bottom: 20px;
            }
            .card-controls {
                flex-wrap: wrap;
                gap: 10px;
            }
        }

        @media (max-width: 600px) {
            .concept-card {
                min-height: 280px;
                padding: 15px;
            }
            .concept {
                font-size: 26px;
            }
            .explanation {
                font-size: 16px;
            }
            .example {
                font-size: 13px;
            }
            .concept-header {
                flex-direction: column;
                gap: 10px;
            }
            .card-controls {
                flex-direction: column;
                gap: 10px;
            }
        }

        @media (max-width: 400px) {
            .concept-card {
                min-height: 250px;
                padding: 12px;
            }
            .concept {
                font-size: 24px;
            }
            .explanation {
                font-size: 15px;
            }
            .example {
                font-size: 12px;
            }
        }
        /* 生肖卡片样式 */
        .zodiac-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .zodiac-card {
            background: var(--card-bg-color);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid var(--border-card);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .zodiac-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .zodiac-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .zodiac-emoji {
            font-size: 40px;
        }

        .zodiac-name {
            font-size: 22px;
            font-weight: 700;
        }

        .zodiac-rank {
            margin-left: auto;
            background: rgba(155, 89, 182, 0.15);
            color: var(--science);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .zodiac-title {
            font-size: 14px;
            color: var(--science);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .zodiac-trait {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            line-height: 1.6;
        }

        .zodiac-story {
            font-size: 13px;
            color: var(--text-color);
            background: rgba(0, 0, 0, 0.05);
            border-radius: 8px;
            padding: 12px;
            line-height: 1.6;
            border-left: 3px solid var(--science);
        }

        .zodiac-detail-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .zodiac-detail-emoji {
            font-size: 80px;
            display: block;
            margin-bottom: 10px;
        }

        .zodiac-detail-name {
            font-size: 32px;
            font-weight: 700;
            color: var(--science);
        }

        .zodiac-detail-title {
            font-size: 16px;
            color: var(--text-secondary);
        }

        .zodiac-back-btn {
            margin-bottom: 20px;
        }

        .zodiac-rule-block {
            background: var(--card-bg-color);
            border-radius: 12px;
            padding: 20px 25px;
            margin-bottom: 16px;
            border: 1px solid var(--border-card);
        }

        .zodiac-rule-heading {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--science);
        }

        .zodiac-rule-heading .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        .zodiac-rule-text {
            color: var(--text-color);
            font-size: 15px;
            line-height: 1.8;
        }

        @media (max-width: 600px) {
            .zodiac-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

    <link rel="stylesheet" href="assets/css/learning-assistant.css">
    <script src="assets/js/learning-assistant.js"></script>
    <script src="assets/js/common.js"></script>
</head>

<body>
    <div class="container">
        <!-- 科学概念页面 -->
        <div class="page active" id="conceptPage">
            <div class="main-content">
                <div class="concept-card">
                    <div class="concept-header">
                        <div class="concept" id="currentConcept">加载中...</div>
                        <button class="speak-btn-icon" id="speakBtn">
                            <i class="fas fa-volume-up"></i>
                        </button>
                    </div>
                    <div class="category" id="currentCategory">科学</div>
                    <div class="explanation" id="currentExplanation">加载科学概念数据中</div>
                    <div class="example" id="currentExample">请稍候，正在加载科学知识数据。</div>

                    <div class="card-controls">
                        <button class="btn btn-primary" id="prevBtn" disabled>
                            <i class="fas fa-arrow-left"></i>
                            <span>上一个</span>
                        </button>
                        <button class="btn btn-success" id="knowBtn" disabled>
                            <i class="fas fa-check"></i>
                            <span>理解</span>
                        </button>
                        <button class="btn btn-warning" id="notKnowBtn" disabled>
                            <i class="fas fa-times"></i>
                            <span>不理解</span>
                        </button>
                        <button class="btn btn-primary" id="nextBtn" disabled>
                            <span>下一个</span>
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>

                <div class="progress-container">
                    <div class="progress-title">
                        <i class="fas fa-chart-line"></i>
                        <span>学习进度</span>
                    </div>
                    <div class="stats">
                        <div class="stat-card">
                            <div class="stat-value" id="totalCount">0</div>
                            <div class="stat-label">概念总数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="learnedCount">0</div>
                            <div class="stat-label">已学概念</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="masteredCount">0</div>
                            <div class="stat-label">已掌握</div>
                        </div>
                    </div>

                    <div class="progress-bar-container">
                        <div class="progress-info">
                            <span>学习进度</span>
                            <span id="progressPercentage">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                    </div>

                    <div class="progress-title">
                        <i class="fas fa-book"></i>
                        <span>当前科学主题</span>
                    </div>

                    <select class="form-control" id="topicSelector">
                        <option value="physics">物理科学</option>
                        <option value="chemistry">化学</option>
                        <option value="biology">生物科学</option>
                        <option value="earth">地球科学</option>
                        <option value="space">太空科学</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 模拟太空页面 -->
        <div class="page" id="spacePage">
            <div class="space-simulation-container">
                <div class="canvas-container">
                    <div class="square-canvas">
                        <canvas id="solarSystem"></canvas>
                    </div>
                </div>

                <div class="controls-panel">
                    <div class="control-group">
                        <div class="control-label">模拟控制</div>
                        <div class="control-row">
                            <button id="pauseBtn" class="btn btn-primary" style="flex: 1;">
                                <i class="fas fa-pause"></i>
                                <span>暂停</span>
                            </button>
                            <button id="resetBtn" class="btn btn-success" style="flex: 1;">
                                <i class="fas fa-refresh"></i>
                                <span>重置</span>
                            </button>
                        </div>
                        <div class="control-row">
                            <button id="fullscreenBtn" class="btn btn-warning" style="flex: 1;">
                                <i class="fa fa-expand"></i>
                                <span>全屏</span>
                            </button>
                        </div>
                    </div>

                    <div class="control-group">
                        <div class="control-label">模拟速度</div>
                        <div class="control-row">
                            <input type="range" id="speedRange" min="0.1" max="5" step="0.1" value="1"
                                style="flex: 1;">
                            <span id="speedValue" style="min-width: 40px; text-align: center;">1x</span>
                        </div>
                    </div>

                    <div class="control-group">
                        <div class="control-label">缩放级别</div>
                        <div class="control-row">
                            <input type="range" id="zoomRange" min="0.5" max="2" step="0.1" value="1"
                                style="flex: 1;">
                            <span id="zoomValue" style="min-width: 40px; text-align: center;">1x</span>
                        </div>
                    </div>

                    <div class="control-group">
                        <div class="control-label">显示选项</div>
                        <div class="control-row">
                            <label for="labelsToggle" style="flex: 1;">显示标签</label>
                            <label class="switch">
                                <input type="checkbox" id="labelsToggle" checked>
                                <span class="slider-round"></span>
                            </label>
                        </div>
                    </div>

                    <div class="control-group">
                        <div class="control-label">天体信息</div>
                        <div style="font-size: 12px; color: var(--text-secondary); line-height: 1.4;">
                            点击太阳系中的天体查看详细信息。当前显示太阳系八大行星及其主要卫星的轨道运动。
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 生活常识页面 - 十二生肖 -->
        <div class="page" id="zodiacPage">
            <div class="main-content">
                <div class="concept-card" id="zodiacCard">
                    <div id="zodiacGrid">
                        <!-- 生肖卡片网格 -->
                    </div>
                </div>

                <div class="progress-container" id="zodiacSidebar">
                    <div class="progress-title">
                        <i class="fas fa-paw"></i>
                        <span>十二生肖</span>
                    </div>
                    <div style="color:var(--text-secondary);font-size:14px;margin-bottom:15px;">
                        点击卡片查看每个生肖的趣味故事
                    </div>
                    <div class="progress-title">
                        <i class="fas fa-lightbulb"></i>
                        <span>顺序口诀</span>
                    </div>
                    <div style="color:var(--text-secondary);font-size:13px;line-height:1.8;">
                        鼠、牛、虎、兔、龙、蛇、马、羊、猴、鸡、狗、猪<br><br>
                        小老鼠，打头来，牛把蹄儿抬。<br>
                        老虎回头一声吼，兔儿跳得快。<br>
                        龙和蛇，尾巴甩，马羊步儿迈。<br>
                        小猴机灵蹦又跳，鸡唱天下白。<br>
                        狗儿跳，猪儿叫，老鼠又跟来。
                    </div>
                </div>
            </div>
        </div>

        <!-- 生肖详情页面 -->
        <div class="page" id="zodiacDetailPage">
            <div class="main-content">
                <div class="concept-card" id="zodiacDetailCard">
                    <!-- 动态渲染 -->
                </div>
                <div class="progress-container">
                    <div class="progress-title">
                        <i class="fas fa-info-circle"></i>
                        <span>生肖详情</span>
                    </div>
                    <div id="zodiacDetailInfo" style="font-size:14px;color:var(--text-secondary);line-height:1.8;">
                    </div>
                    <div style="margin-top:16px;">
                        <button class="btn btn-primary" id="zodiacBackBtn" style="width:100%;">
                            <i class="fas fa-arrow-left"></i>
                            <span>返回生肖列表</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 设置页面 -->
        <div class="page" id="settingsPage">
            <h2>系统设置</h2>

            <div class="settings-grid">
                <div class="settings-card">
                    <div class="settings-header">
                        <i class="fas fa-book settings-icon"></i>
                        <div class="settings-title">学习设置</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">默认科学主题</label>
                        <select class="form-control" id="defaultTopic">
                            <option value="physics">物理科学</option>
                            <option value="chemistry">化学</option>
                            <option value="biology">生物科学</option>
                            <option value="earth">地球科学</option>
                            <option value="space">太空科学</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">新概念每日数量</label>
                        <input type="range" min="5" max="20" value="10" class="range-slider" id="dailyConceptsSlider">
                        <div class="slider-value" id="dailyConceptsValue">10 个</div>
                    </div>
                </div>

                <div class="settings-card">
                    <div class="settings-header">
                        <i class="fas fa-database settings-icon"></i>
                        <div class="settings-title">数据管理</div>
                    </div>

                    <div class="form-group">
                        <button class="btn btn-primary" style="width: 100%; margin-bottom: 15px;">
                            <i class="fas fa-download"></i>
                            <span>导出学习数据</span>
                        </button>

                        <button class="btn btn-secondary" style="width: 100%; margin-bottom: 15px;">
                            <i class="fas fa-upload"></i>
                            <span>导入学习数据</span>
                        </button>

                        <button class="btn btn-warning" style="width: 100%;">
                            <i class="fas fa-trash"></i>
                            <span>重置学习进度</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 导航配置
        const NAV_CONFIG = [
            { page: 'concept',  icon: 'fa-flask', label: '科学概念', active: true },
            { page: 'zodiac',   icon: 'fa-paw',   label: '生活常识', active: false },
            { page: 'space',    icon: 'fa-rocket', label: '模拟太空', active: false },
        ];

        // 十二生肖数据
        const zodiacAnimals = [
            {
                id: 'rat', name: '鼠', emoji: '🐭', rank: 1, title: '机智小先锋',
                trait: '小老鼠虽然个子小，但它非常聪明机灵。',
                story: '比赛那天，它跳上了憨厚的牛大哥的背，在快到终点的时候一下子跳了下来，第一个冲过了终点线，成为了十二生肖的第一名！凭借智慧赢得了生肖赛跑的冠军！',
                detail: '鼠年出生的人通常机智灵活，善于观察，适应能力强。'
            },
            {
                id: 'ox', name: '牛', emoji: '🐮', rank: 2, title: '勤劳老大哥',

                story: '在生肖比赛中被小老鼠"借力"没能得第一，但它依然凭借实力获得了第二名，是大家学习的榜样。',
                detail: '牛年出生的人通常勤奋踏实，有耐心和毅力，是值得信赖的伙伴。'
            },
            {
                id: 'tiger', name: '虎', emoji: '🐯', rank: 3, title: '威风百兽王',
                trait: '老虎是森林里的百兽之王，威风凛凛，内心充满自信与勇气，是力量的象征。',
                story: '在生肖赛跑比赛中，老虎凭借强大的爆发力和惊人的速度，一马当先冲到了前面，最终获得了第三名的好成绩！',
                detail: '虎年出生的人通常勇敢自信，富有领导力，做事果断有魄力。'
            },
            {
                id: 'rabbit', name: '兔', emoji: '🐰', rank: 4, title: '温柔小天使',
                trait: '小兔子天生性格温和，待人友善，是大家都喜欢的好朋友。',
                story: '虽然不会游泳，但它非常聪明。它踩着河里的石头，又借助了龙吐的水浪，巧妙地渡过了难关，最终获得了生肖赛跑的第四名。',
                detail: '兔年出生的人通常温柔善良，心思细腻，有很好的人缘。'
            },
            {
                id: 'dragon', name: '龙', emoji: '🐲', rank: 5, title: '神秘大英雄',
                trait: '龙拥有腾云驾雾、呼风唤雨的神奇本领，是传说中无所不能的存在。',
                story: '比赛途中，它不忍人间干旱，毅然停下脚步帮助降雨，展现了无私的爱心。虽然因此耽误了赛程只获得第五名，但它永远是我们心中的"无冕之王"。能力越大，责任越大！',
                detail: '龙年出生的人通常充满活力，有远大抱负，是天生的领导者。'

        (function() {
            // 获取Canvas元素并设置上下文
            const canvas = document.getElementById('solarSystem');
            const ctx = canvas.getContext('2d');

            // 设置Canvas尺寸 - 适应正方形容器
            function resizeCanvas() {
                const container = document.querySelector('.square-canvas');
                const size = container.clientWidth;
                canvas.width = size;
                canvas.height = size*0.8;
            }

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // 天体数据
            const celestialBodies = [
                { name: "太阳", radius: 30, color: "#ff7d00", orbitRadius: 0, orbitSpeed: 0, angle: 0, tilt: 0 },
                { name: "水星", radius: 4, color: "#a8a8a8", orbitRadius: 70, orbitSpeed: 0.04, angle: 0, tilt: 0 },

                { name: "月球", radius: 2, color: "#d0d0d0", orbitRadius: 20, orbitSpeed: 0.05, angle: 0, tilt: 0, parent: 3 },
                { name: "火星", radius: 5, color: "#e74c3c", orbitRadius: 180, orbitSpeed: 0.008, angle: 0, tilt: 0 },
                { name: "木星", radius: 20, color: "#f39c12", orbitRadius: 230, orbitSpeed: 0.002, angle: 0, tilt: 3 },
                { name: "土星", radius: 16, color: "#f1c40f", orbitRadius: 300, orbitSpeed: 0.0009, angle: 0, tilt: 26.7, ring: { innerRadius: 20, outerRadius: 30, color: "#d4ac0d" } },
                { name: "天王星", radius: 12, color: "#3498db", orbitRadius: 350, orbitSpeed: 0.0004, angle: 0, tilt: 97.8 },
                { name: "海王星", radius: 11, color: "#2980b9", orbitRadius: 400, orbitSpeed: 0.0001, angle: 0, tilt: 28.3 }
            ];

            // 动画控制变量
            let isPaused = false;
            let animationSpeed = 1;
            let zoomLevel = 1;
            let showLabels = true;

            // 计算中心坐标
            function getCenter() {
                return {
                    x: canvas.width / 2,
                    y: canvas.height / 2
                };
            }

            // 绘制天体轨道
            function drawOrbit(orbitRadius, center) {
                ctx.beginPath();
                ctx.arc(center.x, center.y, orbitRadius, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // 绘制天体
            function drawCelestialBody(body, center) {
                // 计算天体位置
                let x, y;
                if (body.orbitRadius === 0) {
                    x = center.x;
                    y = center.y;
                } else {
                    const parent = body.parent !== undefined ? celestialBodies[body.parent] : null;
                    const parentX = parent ? parent.x : center.x;
                    const parentY = parent ? parent.y : center.y;

                    x = parentX + Math.cos(body.angle) * body.orbitRadius * zoomLevel;
                    y = parentY + Math.sin(body.angle) * body.orbitRadius * zoomLevel;

                    body.x = x;
                    body.y = y;
                }

                if (body.orbitRadius > 0) {
                    const orbitCenter = body.parent !== undefined
                        ? { x: celestialBodies[body.parent].x, y: celestialBodies[body.parent].y }
                        : center;
                    drawOrbit(body.orbitRadius * zoomLevel, orbitCenter);
                }

                if (body.ring) {
                    ctx.beginPath();
                    ctx.ellipse(x, y, body.ring.outerRadius * zoomLevel, body.ring.innerRadius * zoomLevel,
                        body.tilt * Math.PI / 180, 0, Math.PI * 2);
                    ctx.strokeStyle = body.ring.color;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                ctx.beginPath();
                ctx.arc(x, y, body.radius * zoomLevel, 0, Math.PI * 2);

                const gradient = ctx.createRadialGradient(
                    x - body.radius * zoomLevel * 0.3, y - body.radius * zoomLevel * 0.3, 0,
                    x, y, body.radius * zoomLevel
                );

                if (body.name === "太阳") {
                    gradient.addColorStop(0, "#fffacd");
                    gradient.addColorStop(0.5, body.color);
                    gradient.addColorStop(1, "#ff4500");
                } else {
                    gradient.addColorStop(0, body.color);
                    gradient.addColorStop(1, darkenColor(body.color, 0.7));
                }

                ctx.fillStyle = gradient;
                ctx.fill();

                if (body.name === "太阳") {
                    ctx.shadowColor = body.color;
                    ctx.shadowBlur = 20 * zoomLevel;
                    ctx.beginPath();
                    ctx.arc(x, y, body.radius * zoomLevel, 0, Math.PI * 2);
                    ctx.fillStyle = body.color + "40";
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                if (showLabels) {
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold ' + Math.max(8, 12 * zoomLevel) + 'px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(body.name, x, y - body.radius * zoomLevel - 5);
                }
            }

            function darkenColor(color, amount) {
                if (color.startsWith('#')) {
                    let r = parseInt(color.substr(1, 2), 16);
                    let g = parseInt(color.substr(3, 2), 16);
                    let b = parseInt(color.substr(5, 2), 16);

                    r = Math.max(0, Math.floor(r * amount));
                    g = Math.max(0, Math.floor(g * amount));
                    b = Math.max(0, Math.floor(b * amount));

                    return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
                }
                return color;
            }

            function animate() {
                if (!isPaused) {
                    celestialBodies.forEach(body => {
                        body.angle += body.orbitSpeed * animationSpeed;
                    });
                }

                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const center = getCenter();

                celestialBodies.forEach(body => {
                    drawCelestialBody(body, center);
                });

                requestAnimationFrame(animate);
            }

            animate();

            document.getElementById('pauseBtn').addEventListener('click', function() {
                isPaused = !isPaused;
                this.innerHTML = isPaused ? '<i class="fas fa-play"></i><span>继续</span>' : '<i class="fas fa-pause"></i><span>暂停</span>';
            });

            document.getElementById('resetBtn').addEventListener('click', function() {
                celestialBodies.forEach(body => {
                    body.angle = 0;
                });
            });

            document.getElementById('fullscreenBtn').addEventListener('click', function() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        alert(`全屏请求出错: ${err.message}`);
                    });
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                }
            });

            const speedRange = document.getElementById('speedRange');
            const speedValue = document.getElementById('speedValue');
            speedRange.addEventListener('input', function() {
                animationSpeed = parseFloat(this.value);
                speedValue.textContent = animationSpeed.toFixed(1) + 'x';
            });

            const zoomRange = document.getElementById('zoomRange');
            const zoomValue = document.getElementById('zoomValue');
            zoomRange.addEventListener('input', function() {
                zoomLevel = parseFloat(this.value);
                zoomValue.textContent = zoomLevel.toFixed(1) + 'x';
            });

            document.getElementById('labelsToggle').addEventListener('change', function() {
                showLabels = this.checked;
            });
        })();
    </script>
</body>

</html>
