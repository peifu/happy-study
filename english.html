            // 语法宝典功能
            let grammarData = null;

            async function loadGrammarData() {
                if (grammarData) return grammarData;
                try {
                    const resp = await fetch('data/english/grammar.json');
                    grammarData = await resp.json();
                    return grammarData;
                } catch (e) {
                    console.error('加载语法数据失败:', e);
                    return [];
                }
            }

            async function initGrammarPage() {
                const data = await loadGrammarData();
                if (!data.length) {
                    document.getElementById('grammarNavList').innerHTML =
                        '<div class="grammar-placeholder">语法数据加载失败</div>';
                    document.getElementById('grammarContent').innerHTML =
                        '<div class="grammar-placeholder">语法数据加载失败，请刷新页面重试</div>';
                    return;
                }

                // 渲染侧边栏
                const saved = localStorage.getItem('grammarSection');
                const activeId = saved || data[0].id;

                const navList = document.getElementById('grammarNavList');
                navList.innerHTML = data.map(section =>
                    `<div class="grammar-nav-item${section.id === activeId ? ' active' : ''}"
                          data-id="${section.id}"
                          style="${section.id === activeId ? '--grammar-accent:' + section.color : ''}">
                        <span class="grammar-nav-emoji">${section.emoji}</span>
                        <span>${section.title}</span>
                        <span class="grammar-nav-color" style="background:${section.color}"></span>
                    </div>`
                ).join('');

                // 绑定点击事件
                navList.querySelectorAll('.grammar-nav-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const id = item.getAttribute('data-id');
                        showGrammarSection(id);
                    });
                });

                // 显示已保存的或第一个section
                showGrammarSection(activeId);
            }

            function showGrammarSection(id) {
                if (!grammarData) return;
                const section = grammarData.find(s => s.id === id);
                if (!section) return;

                localStorage.setItem('grammarSection', id);

                // 更新侧边栏高亮
                document.querySelectorAll('.grammar-nav-item').forEach(item => {
                    const isActive = item.getAttribute('data-id') === id;
                    item.classList.toggle('active', isActive);
                    if (isActive) {
                        item.style.setProperty('--grammar-accent', section.color);
                    }
                });

                // 渲染内容
                let html = '';
                html += `<div class="grammar-section-header" style="border-top: 4px solid ${section.color}">`;
                html += `<div class="grammar-section-title">`;
                html += `<span class="grammar-section-emoji">${section.emoji}</span>`;
                html += `<span style="color:${section.color}">${section.title}</span>`;
                html += `</div>`;
                html += `<div class="grammar-section-intro">${section.intro}</div>`;
                html += `</div>`;

                // 规则块
                if (section.sections) {
                    section.sections.forEach(sec => {
                        html += `<div class="grammar-rule-block">`;
                        html += `<div class="grammar-rule-heading">`;
                        html += `<span class="dot" style="background:${section.color}"></span>`;
                        html += sec.heading;
                        html += `</div>`;

                        if (sec.text) {
                            html += `<div class="grammar-rule-text">${sec.text}</div>`;
                        }

                        if (sec.formula) {
                            html += `<div class="grammar-formula">📐 ${sec.formula}</div>`;
                        }

                        if (sec.badges) {
                            sec.badges.forEach(b => {
                                html += `<span class="grammar-badge">⚠️ ${b}</span>`;
                            });
                        }

                        if (sec.table) {
                            html += `<div class="grammar-table-wrap"><table class="grammar-table"><thead><tr>`;
                            sec.table.headers.forEach(h => {
                                html += `<th>${h}</th>`;
                            });
                            html += `</tr></thead><tbody>`;
                            sec.table.rows.forEach(row => {
                                html += `<tr>`;
                                row.forEach(cell => {
                                    html += `<td>${cell}</td>`;
                                });
                                html += `</tr>`;
                            });
                            html += `</tbody></table></div>`;
                        }

                        if (sec.irregulars) {
                            html += `<div class="grammar-irregulars">`;
                            sec.irregulars.forEach(irr => {
                                html += `<div class="grammar-irregular-item">${irr[0]}`;
                                if (irr[1]) html += `<br><small style="color:var(--text-secondary)">${irr[1]}</small>`;
                                html += `</div>`;
                            });
                            html += `</div>`;
                        }

                        if (sec.examples_inline) {
                            sec.examples_inline.forEach(ex => {
                                html += `<div class="grammar-example-card"><span class="ex-label">例句</span><div class="ex-en">${ex}</div></div>`;
                            });
                        }

                        html += `</div>`;
                    });
                }

                // Highlight box (重点记忆)
                if (section.highlight) {
                    html += `<div class="grammar-highlight-box">`;
                    html += `<p><strong>${section.highlight.title}</strong></p>`;
                    section.highlight.items.forEach(item => {
                        html += `<p>${item}</p>`;
                    });
                    html += `</div>`;
                }

                // Compare box (正误对比)
                if (section.compare) {
                    html += `<div class="grammar-compare-box">`;
                    if (section.compare.right && section.compare.right.length) {
                        html += `<div class="grammar-compare-item grammar-compare-right">`;
                        html += `<div class="status">✅ 正确</div>`;
                        section.compare.right.forEach(item => {
                            html += `<div class="example">${item.en}</div>`;
                            html += `<div style="font-size:12px;color:var(--text-secondary)">${item.zh}</div>`;
                        });
                        html += `</div>`;
                    }
                    if (section.compare.wrong && section.compare.wrong.length) {
                        html += `<div class="grammar-compare-item grammar-compare-wrong">`;
                        html += `<div class="status">❌ 错误</div>`;
                        section.compare.wrong.forEach(item => {
                            html += `<div class="example">${item.en}</div>`;
                            html += `<div style="font-size:12px;color:var(--text-secondary)">${item.zh}</div>`;
                        });
                        html += `</div>`;
                    }
                    html += `</div>`;
                }

                // Word family (单词家族)
                if (section.wordFamily) {
                    html += `<div class="grammar-word-family">`;
                    section.wordFamily.forEach(wf => {
                        html += `<div class="grammar-word-tag"><div class="w">${wf.word}</div><div class="t">${wf.type}</div></div>`;
                    });
                    html += `</div>`;
                }

                // Timeline (时态时间轴)
                if (section.timeline) {
                    html += `<div class="grammar-timeline">`;
                    section.timeline.forEach(tp => {
                        html += `<div class="grammar-time-point">`;
                        html += `<div class="tl">${tp.label}</div>`;
                        html += `<div class="tx">${tp.example.replace(/\n/g, '<br>')}</div>`;
                        html += `</div>`;
                    });
                    html += `</div>`;
                }

                // Rhyme box (记忆口诀 - 增强版)
                if (section.rhyme) {
                    html += `<div class="grammar-rhyme-box">${section.rhyme.replace(/\n/g, '<br>')}</div>`;
                } else if (section.tip) {
                    html += `<div class="grammar-tip">`;
                    html += `<span class="grammar-tip-emoji">🎵</span>`;
                    html += `<span>${section.tip}</span>`;
                    html += `</div>`;
                }

                // 例句
                if (section.examples && section.examples.length) {
                    html += `<div class="grammar-rule-block">`;
                    html += `<div class="grammar-rule-heading">`;
                    html += `<span class="dot" style="background:${section.color}"></span>`;
                    html += `例句`;
                    html += `</div>`;
                    section.examples.forEach(ex => {
                        html += `<div class="grammar-example-item">`;
                        html += `<span class="grammar-example-en">${ex.en}</span>`;
                        html += `<span class="grammar-example-zh">${ex.zh}</span>`;
                        html += `</div>`;
                    });
                    html += `</div>`;
                }

                // Quiz box (互动练习)
                if (section.quiz) {
                    html += `<div class="grammar-quiz-box">`;
                    html += `<h4>📝 小测验（点击题目查看答案）</h4>`;
                    section.quiz.forEach((q, i) => {
                        html += `<div class="grammar-quiz-item" onclick="this.querySelector('.grammar-quiz-answer').classList.toggle('show')">`;
                        html += `<strong>${i + 1}.</strong> ${q.q}`;
                        html += `<div class="grammar-quiz-answer">✅ ${q.a}</div>`;
                        html += `</div>`;
                    });
                    html += `</div>`;
                }

                document.getElementById('grammarContent').innerHTML = html;
            }

        </script>
</body>

</html>
