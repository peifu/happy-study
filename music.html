
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快乐学习 - 音乐学习</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/common.css">
    <style>
        /* 音乐播放器容器布局 — 左歌词，右上控件，右下歌单 */
        .player-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            grid-template-rows: auto 1fr;
            gap: 20px;
            min-height: 70vh;
        }

        /* 音乐播放器 — 右上控件区 */
        .music-player {
            background: var(--card-bg-color);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 105, 180, 0.2);
        }

        .music-player::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 105, 180, 0.1) 0%, transparent 70%);
            transform: rotate(30deg);
            z-index: 0;
        }

        .song-info {
            text-align: center;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .song-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .control-btn {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .control-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
        }

        .control-btn i {
            font-size: 18px;
        }

        .play-btn {
            width: 52px;
            height: 52px;
        }

        .play-btn i {
            font-size: 22px;
        }

        /* Audio progress bar overrides */
        .progress-container {
            position: relative;
            z-index: 1;
            margin: 20px 0;
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0;
        }

        .progress-bar {
            height: 8px;
            background: var(--progress-bg);
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 4px;
            width: 0%;
            transition: width 0.1s ease;
            box-shadow: none;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 8px;
        }

        /* 歌词显示区域 — 占据左列，跨两行 */
        .lyrics-container {
            background: var(--card-bg-color);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255, 105, 180, 0.2);
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            grid-row: 1 / 3;
        }

        .lyrics-container.scroll-x {
            overflow-x: auto;
        }

        .lyrics-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 105, 180, 0.05) 0%, transparent 70%);
            transform: rotate(30deg);
            z-index: 0;
        }

        .lyrics-title {
            font-size: 18px;
            color: var(--primary);
            margin-bottom: 15px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .lyrics-content {
            position: relative;
            z-index: 1;
        }

        .lyric-line {
            padding: 6px 12px;
            margin: 4px 0;
            border-radius: 8px;
            transition: var(--transition);
            text-align: center;
            font-size: 14px;
        }

        .lyric-line.active {
            background: rgba(255, 105, 180, 0.15);
            color: var(--primary);
            font-weight: 600;
            transform: scale(1.02);
        }

        /* 歌曲列表面板 — 右下 */
        .songs-panel {
            background: var(--card-bg-color);
            border-radius: 16px;
            padding: 15px;
            border: 1px solid rgba(255, 105, 180, 0.2);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .songs-panel-title {
            font-size: 16px;
            color: var(--primary);
            margin-bottom: 10px;
            text-align: center;
            flex-shrink: 0;
        }

        .songs-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            flex: 1;
        }

        .song-item {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            padding: 10px 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: var(--transition);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .song-item:hover {
            border-color: var(--primary);
            background: rgba(255, 105, 180, 0.08);
        }

        .song-item.active {
            border-color: var(--primary);
            background: rgba(255, 105, 180, 0.15);
        }

        .song-item-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            flex-shrink: 0;
        }

        .song-item-info {
            flex: 1;
            min-width: 0;
        }

        .song-item-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-item-artist {
            font-size: 11px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-item-duration {
            font-size: 11px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        /* Responsive */
        @media (max-width: 1000px) {
            .player-layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
                min-height: auto;
            }
            .lyrics-container { grid-row: auto; max-height: 300px; }
        }

        @media (max-width: 600px) {
            .player-layout { gap: 12px; }
            .lyrics-container { padding: 15px; max-height: 250px; }
            .music-player { padding: 15px; }
            .songs-panel { padding: 12px; }
        }
    </style>
    <link rel="stylesheet" href="assets/css/learning-assistant.css">
    <script src="assets/js/learning-assistant.js"></script>
    <script src="assets/js/common.js"></script>
</head>

<body>
    <div class="container">
        <!-- 音乐播放页面 -->
        <div class="page active" id="playerPage">
            <div class="player-layout">
                <!-- 左列：歌词 -->
                <div class="lyrics-container">
                    <h3 class="lyrics-title">歌词</h3>
                    <div class="lyrics-content" id="lyricsContent">
                        <div class="lyric-line">请选择歌曲开始播放</div>
                    </div>
                </div>

                <!-- 右上：播放控件 -->
                <div class="music-player">
                    <div class="song-info">
                        <h2 class="song-title" id="currentSongTitle">选择歌曲</h2>
                        <p class="song-artist" id="currentSongArtist">快乐学习</p>
                    </div>
                    <div class="player-controls">
                        <button class="control-btn" id="prevBtn"><i class="fas fa-step-backward"></i></button>
                        <button class="control-btn play-btn" id="playBtn"><i class="fas fa-play" id="playIcon"></i></button>
                        <button class="control-btn" id="nextBtn"><i class="fas fa-step-forward"></i></button>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar" id="progressBar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <div class="time-display">
                            <span id="currentTime">0:00</span>
                            <span id="totalTime">0:00</span>
                        </div>
                    </div>
                </div>

                <!-- 右下：歌曲列表 -->
                <div class="songs-panel">
                    <div class="songs-panel-title">歌曲列表</div>
                    <div class="songs-grid" id="songsGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 音频元素 -->
    <audio id="audioPlayer"></audio>

    <script>
        // 导航配置 — 单页布局，无需歌曲列表页签
        const NAV_CONFIG = [
            { page: 'player', icon: 'fa-music', label: '音乐播放', active: true },
        ];

        // 音乐数据（从JSON加载）
        let songs = [];
        let lyricsCache = {};

        // 播放器状态
        let currentSongIndex = 0;
        let isPlaying = false;
        let audioPlayer = document.getElementById('audioPlayer');
        let lyricsInterval = null;
        let pendingAutoPlay = false;

        // DOM元素
        const currentSongTitle = document.getElementById('currentSongTitle');
        const currentSongArtist = document.getElementById('currentSongArtist');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTime = document.getElementById('currentTime');
        const totalTime = document.getElementById('totalTime');
        const lyricsContent = document.getElementById('lyricsContent');
        const songsGrid = document.getElementById('songsGrid');
        let navLinks, pages;

        // 加载歌曲元数据
        async function loadSongsData() {
            try {
                const resp = await fetch('data/music/songs.json');
                songs = await resp.json();
            } catch (e) {
                console.error('加载歌曲列表失败:', e);
            }
        }

        // 加载歌词（按需 + 缓存）
        async function loadLyrics(lyricFile) {
            if (lyricsCache[lyricFile]) return lyricsCache[lyricFile];
            try {
                const resp = await fetch(lyricFile);
                lyricsCache[lyricFile] = await resp.json();
                return lyricsCache[lyricFile];
            } catch (e) {
                console.error('加载歌词失败:', lyricFile, e);
                return [{ time: 0, text: '暂无歌词' }];
            }
        }

        // 初始化
        async function init() {
            navLinks = document.querySelectorAll('.nav-link');
            pages = document.querySelectorAll('.page');
            syncThemeFromIndex();
            await loadSongsData();
            renderSongsList();
            await loadSong(0);
            setupEventListeners();
        }

        // 设置事件监听
        function setupEventListeners() {
            // 导航链接
            setupNavLinks(navLinks, pages);

            // 播放控制
            playBtn.addEventListener('click', togglePlay);
            prevBtn.addEventListener('click', playPrevSong);
            nextBtn.addEventListener('click', playNextSong);

            // 进度条点击
            progressBar.addEventListener('click', seekToPosition);

            // 音频事件
            audioPlayer.addEventListener('timeupdate', updateProgress);
            audioPlayer.addEventListener('ended', playNextSong);
            audioPlayer.addEventListener('loadedmetadata', updateTotalTime);
        }

        // 加载歌曲（index: 歌曲序号, autoPlay: 是否加载完自动播放）
        async function loadSong(index, autoPlay) {
            if (!songs.length || index < 0 || index >= songs.length) return;

            currentSongIndex = index;
            var song = songs[currentSongIndex];

            currentSongTitle.textContent = song.title;
            currentSongArtist.textContent = song.artist;

            audioPlayer.src = song.file;

            // 按需加载歌词
            var lyrics = await loadLyrics(song.lyricFile);
            renderLyrics(lyrics);

            updateSongListActive();

            // 标记是否需要在音频就绪后自动播放
            pendingAutoPlay = !!autoPlay;
        }

        // 音频数据加载完成时可以播放
        audioPlayer.addEventListener('canplay', function() {
            if (pendingAutoPlay) {
                pendingAutoPlay = false;
                playSong();
            }
        });

        // 切换播放状态
        function togglePlay() {
            if (isPlaying) {
                pauseSong();
            } else {
                // 如果还没有加载过音频源，尝试直接播放
                if (!audioPlayer.src || audioPlayer.src === window.location.href) {
                    loadSong(currentSongIndex, true);
                } else {
                    playSong();
                }
            }
        }

        // 播放歌曲
        function playSong() {
            audioPlayer.play()
                .then(() => {
                    isPlaying = true;
                    playIcon.className = 'fas fa-pause';
                    startLyricsSync();
                })
                .catch(error => {
                    console.error('播放失败:', error);
                    simulatePlayback();
                });
        }

        // 暂停歌曲
        function pauseSong() {
            audioPlayer.pause();
            isPlaying = false;
            playIcon.className = 'fas fa-play';
            stopLyricsSync();
        }

        // 播放下一首
        function playNextSong() {
            var wasPlaying = isPlaying;
            if (isPlaying) pauseSong();
            var nextIndex = (currentSongIndex + 1) % songs.length;
            loadSong(nextIndex, wasPlaying);
        }

        // 播放上一首
        function playPrevSong() {
            var wasPlaying = isPlaying;
            if (isPlaying) pauseSong();
            var prevIndex = (currentSongIndex - 1 + songs.length) % songs.length;
            loadSong(prevIndex, wasPlaying);
        }

        // 更新进度
        function updateProgress() {
            const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progressFill.style.width = progress + '%';

            currentTime.textContent = formatTime(audioPlayer.currentTime);

            syncLyrics(audioPlayer.currentTime);
        }

        // 更新总时间
        function updateTotalTime() {
            totalTime.textContent = formatTime(audioPlayer.duration);
        }

        // 跳转到指定位置
        function seekToPosition(event) {
            const progressBarWidth = progressBar.offsetWidth;
            const clickPosition = event.offsetX;
            const seekTime = (clickPosition / progressBarWidth) * audioPlayer.duration;

            audioPlayer.currentTime = seekTime;
        }

        // 格式化时间
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // 渲染歌词
        function renderLyrics(lyrics) {
            lyricsContent.innerHTML = '';
            lyrics.forEach((line, index) => {
                const lyricLine = document.createElement('div');
                lyricLine.className = 'lyric-line';
                lyricLine.textContent = line.text;
                lyricLine.dataset.time = line.time;
                lyricsContent.appendChild(lyricLine);
            });

            checkLyricsScroll();
        }

        // 检测歌词是否需要水平滚动条
        function checkLyricsScroll() {
            const lyricsContainer = document.querySelector('.lyrics-container');
            const lyricsContent = document.getElementById('lyricsContent');

            lyricsContainer.classList.remove('scroll-x');

            setTimeout(() => {
                const contentWidth = lyricsContent.scrollWidth;
                const containerWidth = lyricsContainer.clientWidth - 50;

                if (contentWidth > containerWidth) {
                    lyricsContainer.classList.add('scroll-x');
                }
            }, 100);
        }

        // 开始歌词同步
        function startLyricsSync() {
            stopLyricsSync();
            lyricsInterval = setInterval(() => {
                syncLyrics(audioPlayer.currentTime);
            }, 100);
        }

        // 停止歌词同步
        function stopLyricsSync() {
            if (lyricsInterval) {
                clearInterval(lyricsInterval);
                lyricsInterval = null;
            }
        }

        // 同步歌词
        function syncLyrics(currentTime) {
            const lyricLines = lyricsContent.querySelectorAll('.lyric-line');
            let activeLineIndex = -1;

            for (let i = lyricLines.length - 1; i >= 0; i--) {
                const lineTime = parseFloat(lyricLines[i].dataset.time);
                if (currentTime >= lineTime) {
                    activeLineIndex = i;
                    break;
                }
            }

            lyricLines.forEach((line, index) => {
                if (index === activeLineIndex) {
                    line.classList.add('active');
                    line.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    line.classList.remove('active');
                }
            });
        }

        // 渲染歌曲列表（紧凑行布局：图标 | 歌名·歌手 | 时长）
        function renderSongsList() {
            songsGrid.innerHTML = '';
            songs.forEach((song, index) => {
                const songItem = document.createElement('div');
                songItem.className = 'song-item';
                if (index === currentSongIndex) songItem.classList.add('active');
                songItem.dataset.index = index;
                songItem.innerHTML =
                    '<div class="song-item-icon"><i class="fas fa-music"></i></div>' +
                    '<div class="song-item-info">' +
                        '<div class="song-item-title">' + song.title + '</div>' +
                        '<div class="song-item-artist">' + song.artist + '</div>' +
                    '</div>' +
                    '<div class="song-item-duration">' + song.duration + '</div>';

                songItem.addEventListener('click', function() {
                    if (isPlaying) pauseSong();
                    loadSong(index, true);
                });

                songsGrid.appendChild(songItem);
            });
        }

        // 更新歌曲列表中的高亮项
        function updateSongListActive() {
            var items = songsGrid.querySelectorAll('.song-item');
            items.forEach(function(item, i) {
                item.classList.toggle('active', i === currentSongIndex);
            });
        }

        // 模拟播放（用于演示）
        function simulatePlayback() {
            isPlaying = true;
            playIcon.className = 'fas fa-pause';

            let simulatedTime = 0;
            const simulateInterval = setInterval(() => {
                simulatedTime += 0.1;
                if (simulatedTime > 15) {
                    clearInterval(simulateInterval);
                    playNextSong();
                    return;
                }

                const progress = (simulatedTime / 15) * 100;
                progressFill.style.width = progress + '%';
                currentTime.textContent = formatTime(simulatedTime);
                totalTime.textContent = '2:30';

                syncLyrics(simulatedTime);
            }, 100);

            window.simulateInterval = simulateInterval;
        }

        // 初始化应用
        (function() {
            injectNav(NAV_CONFIG);
            injectFooter();
            injectAssistant();
            setupHomeLink('homeLink', 'index.html');
            initLearningAssistant();
            init();
        })();
    </script>
</body>
</html>
