<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快乐学习 - 音乐学习</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/common.css">
    <style>
        /* ============================================================
           NEON VINYL LOUNGE — Music page aesthetic
           Deep midnight atmosphere · Electric blue + indigo accents
           ============================================================ */

        /* -- Page-level color overrides (scoped, don't break nav/assistant) -- */
        :root {
            --music-bg-deep: #080c18;
            --music-bg-mid: #0f1630;
            --music-accent: #3b82f6;
            --music-accent-glow: rgba(59, 130, 246, 0.18);
            --music-accent2: #6366f1;
            --music-accent2-glow: rgba(99, 102, 241, 0.15);
            --music-surface: rgba(18, 24, 52, 0.75);
            --music-surface-hover: rgba(28, 36, 68, 0.85);
            --music-text-dim: #8892b0;
            --music-text-mid: #b4bedd;
            --music-border: rgba(148, 163, 210, 0.10);
            --music-radius-lg: 20px;
            --music-radius-md: 12px;
            --music-radius-sm: 8px;
        }

        .light-theme {
            --music-bg-deep: #eef2fb;
            --music-bg-mid: #e2e8f8;
            --music-accent: #2563eb;
            --music-accent-glow: rgba(37, 99, 235, 0.10);
            --music-accent2: #4f46e5;
            --music-accent2-glow: rgba(79, 70, 229, 0.07);
            --music-surface: rgba(248, 250, 255, 0.92);
            --music-surface-hover: rgba(250, 252, 255, 0.97);
            --music-text-dim: #7b8ba8;
            --music-text-mid: #1e293b;
            --music-border: rgba(100, 120, 180, 0.12);
        }

        /* -- Body backdrop — deep atmospheric gradient -- */
        body {
            background: linear-gradient(160deg, #05081a 0%, #0c1440 30%, #0a1030 60%, #060c22 100%);
            background-attachment: fixed;
        }
        .light-theme body,
        body.light-theme {
            background: linear-gradient(160deg, #eef2fb 0%, #f2f5fe 30%, #f8f9ff 60%, #f0f4fd 100%);
            background-attachment: fixed;
        }

        /* -- Ambient glow orbs (fixed behind content) -- */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1280px;
        }
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            right: -15%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        /* Light-theme glow orbs — cool blue tones */
        .light-theme body::before,
        body.light-theme::before {
            background: radial-gradient(circle, rgba(80, 130, 220, 0.12) 0%, transparent 70%);
        }
        .light-theme body::after,
        body.light-theme::after {
            background: radial-gradient(circle, rgba(90, 120, 210, 0.10) 0%, transparent 70%);
        }

        /* ============================================================
           MAIN PLAYER LAYOUT — asymmetric 2-column grid
           Lyrics column (hero, wider) | Controls + Playlist stack
           ============================================================ */
        .player-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            grid-template-rows: auto 1fr;
            gap: 20px;
            min-height: calc(100vh - 240px);
        }

        /* ---- Lyrics panel — the hero element, spans both rows ---- */
        .lyrics-container {
            grid-row: 1 / 3;
            background: var(--music-surface);
            border-radius: var(--music-radius-lg);
            padding: 32px 36px;
            border: 1px solid var(--music-border);
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            max-height: calc(100vh - 210px);
            box-shadow:
                0 8px 40px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }
        .lyrics-container::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--music-radius-lg);
            background: radial-gradient(ellipse at 50% 0%, var(--music-accent-glow) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        .lyrics-container.scroll-x { overflow-x: auto; }

        /* Custom scrollbar — lyrics */
        .lyrics-container {
            scrollbar-width: thin;
            scrollbar-color: rgba(59, 130, 246, 0.25) transparent;
        }
        .lyrics-container::-webkit-scrollbar { width: 6px; background: transparent; }
        .lyrics-container::-webkit-scrollbar-track { background: transparent; }
        .lyrics-container::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.25);
            border-radius: 3px;
        }
        .lyrics-container::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.45);
        }

        .lyrics-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--music-accent);
            margin-bottom: 28px;
            text-align: center;
            position: relative;
            z-index: 1;
            font-weight: 600;
        }
        .lyrics-title::after {
            content: '';
            display: block;
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--music-accent), transparent);
            margin: 10px auto 0;
        }

        .lyrics-content { position: relative; z-index: 1; }

        .lyric-line {
            padding: 10px 16px;
            margin: 3px 0;
            border-radius: var(--music-radius-sm);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            font-size: 16px;
            line-height: 1.7;
            color: var(--music-text-dim);
            letter-spacing: 0.02em;
            cursor: default;
        }
        .lyric-line.active {
            background: linear-gradient(90deg, var(--music-accent-glow), var(--music-accent2-glow), var(--music-accent-glow));
            color: #fff;
            font-weight: 600;
            font-size: 17px;
            transform: scale(1.03);
            text-shadow: 0 0 24px rgba(59, 130, 246, 0.5);
            letter-spacing: 0.04em;
        }
        /* ---- Player controls panel — compact top-right ---- */
        .music-player {
            background: var(--music-surface);
            border-radius: var(--music-radius-lg);
            padding: 24px 28px 20px;
            border: 1px solid var(--music-border);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow:
                0 8px 40px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }
        .music-player::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 30% 20%, var(--music-accent2-glow) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .song-info {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        .song-title {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
            letter-spacing: 0.03em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.35);
        }
        .song-artist {
            font-size: 14px;
            color: var(--music-text-dim);
            letter-spacing: 0.04em;
            font-weight: 400;
        }

        /* ---- Transport controls ---- */
        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        .control-btn {
            background: rgba(255, 255, 255, 0.06);
            color: var(--music-text-mid);
            border: 1px solid var(--music-border);
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 15px;
        }
        .control-btn:hover {
            background: rgba(59, 130, 246, 0.12);
            border-color: var(--music-accent);
            color: var(--music-accent);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
            transform: scale(1.08);
        }
        .control-btn:active { transform: scale(0.94); }
        .control-btn i { font-size: 15px; }

        /* Loop mode button */
        .loop-btn { position: relative; }
        .loop-btn.single i,
        .loop-btn.list i,
        .loop-btn.random i { color: var(--music-accent); }
        .loop-btn.single::after {
            content: '1';
            position: absolute;
            top: 2px;
            right: 6px;
            font-size: 9px;
            font-weight: 700;
            color: var(--music-accent);
            font-family: 'Segoe UI', sans-serif;
        }

        /* Play button — larger, blue gradient, vinyl-inspired */
        .play-btn {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--music-accent), #2563eb);
            color: #0a0a14;
            border: none;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.4), 0 4px 18px rgba(0, 0, 0, 0.3);
            font-size: 20px;
        }
        .play-btn:hover {
            background: linear-gradient(135deg, #60a5fa, var(--music-accent));
            box-shadow: 0 0 45px rgba(59, 130, 246, 0.55), 0 6px 22px rgba(0, 0, 0, 0.35);
            color: #0a0a14;
            transform: scale(1.1);
        }
        .play-btn i { font-size: 20px; }

        /* ---- Progress bar — refined ---- */
        .progress-container {
            position: relative;
            z-index: 1;
            margin: 8px 0 0;
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0;
        }
        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }
        .progress-bar:hover { height: 8px; border-radius: 4px; }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--music-accent), var(--music-accent2));
            border-radius: 3px;
            width: 0%;
            transition: width 0.15s linear;
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translate(50%, -50%);
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.6);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .progress-bar:hover .progress-fill::after { opacity: 1; }

        .time-display {
            display: flex;
            justify-content: space-between;
            color: var(--music-text-dim);
            font-size: 12px;
            margin-top: 8px;
            letter-spacing: 0.05em;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
        }

        /* ---- Songs panel — bottom-right, playlist ---- */
        .songs-panel {
            background: var(--music-surface);
            border-radius: var(--music-radius-lg);
            padding: 18px;
            border: 1px solid var(--music-border);
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0;
            max-height: calc(100vh - 500px);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow:
                0 8px 40px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }
        .songs-panel {
            scrollbar-width: thin;
            scrollbar-color: rgba(59, 130, 246, 0.25) transparent;
        }
        .songs-panel::-webkit-scrollbar { width: 5px; background: transparent; }
        .songs-panel::-webkit-scrollbar-track { background: transparent; }
        .songs-panel::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.25);
            border-radius: 3px;
        }
        .songs-panel::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.45);
        }

        /* -- Playlist selector -- */
        .playlist-selector {
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--music-radius-md);
            padding: 10px 16px;
            border: 1px solid var(--music-border);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .playlist-selector label {
            font-size: 13px;
            color: var(--music-text-dim);
            font-weight: 500;
            white-space: nowrap;
            letter-spacing: 0.03em;
        }
        .playlist-selector select {
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid var(--music-border);
            border-radius: var(--music-radius-sm);
            padding: 8px 12px;
            color: var(--music-text-mid);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.25s ease;
            outline: none;
            flex: 1;
            min-width: 0;
        }
        .playlist-selector select:hover { border-color: var(--music-accent); }
        .playlist-selector select:focus {
            border-color: var(--music-accent);
            box-shadow: 0 0 18px rgba(59, 130, 246, 0.2);
        }
        .playlist-selector select option {
            background: #131a38;
            color: #ccd;
            padding: 8px 12px;
        }

        .songs-panel-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--music-text-dim);
            margin-bottom: 10px;
            text-align: center;
            flex-shrink: 0;
        }

        .songs-grid {
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow-y: auto;
            overflow-x: hidden;
            flex: 1;
        }

        .song-item {
            background: rgba(255, 255, 255, 0.025);
            border-radius: var(--music-radius-sm);
            padding: 11px 14px;
            border: 1px solid transparent;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .song-item:hover {
            border-color: rgba(59, 130, 246, 0.3);
            background: rgba(59, 130, 246, 0.07);
            transform: translateX(3px);
        }
        .song-item.active {
            border-color: var(--music-accent);
            background: linear-gradient(90deg, var(--music-accent-glow), rgba(99, 102, 241, 0.08));
            box-shadow: 0 0 16px rgba(59, 130, 246, 0.1);
        }
        .song-item.active .song-item-title { color: var(--music-accent); }

        .song-item-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.25), rgba(99, 102, 241, 0.2));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--music-accent);
            font-size: 13px;
            flex-shrink: 0;
            transition: all 0.25s ease;
        }
        .song-item.active .song-item-icon {
            background: linear-gradient(135deg, var(--music-accent), #2563eb);
            color: #0a0a14;
            box-shadow: 0 0 14px rgba(59, 130, 246, 0.35);
        }
        .song-item-info {
            flex: 1;
            min-width: 0;
        }
        .song-item-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--music-text-mid);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.02em;
            transition: color 0.25s;
        }
        .song-item-artist {
            font-size: 12px;
            color: var(--music-text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 1px;
        }
        .song-item-duration {
            font-size: 11px;
            color: var(--music-text-dim);
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
        }

        /* ============================================================
           LIGHT THEME — "Polar Light Lounge"
           Cool blue-white tones, soft shadows, crisp Arctic atmosphere
           ============================================================ */
        .light-theme .lyrics-container,
        body.light-theme .lyrics-container {
            box-shadow:
                0 4px 24px rgba(100, 120, 190, 0.08),
                0 1px 3px rgba(100, 120, 190, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }
        .light-theme .lyrics-container::-webkit-scrollbar-thumb,
        body.light-theme .lyrics-container::-webkit-scrollbar-thumb {
            background: rgba(37, 99, 235, 0.22);
        }
        .light-theme .lyrics-container::-webkit-scrollbar-thumb:hover,
        body.light-theme .lyrics-container::-webkit-scrollbar-thumb:hover {
            background: rgba(37, 99, 235, 0.40);
        }

        .light-theme .music-player,
        body.light-theme .music-player {
            box-shadow:
                0 4px 24px rgba(100, 120, 190, 0.08),
                0 1px 3px rgba(100, 120, 190, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        .light-theme .control-btn,
        body.light-theme .control-btn {
            background: rgba(150, 165, 215, 0.08);
            color: var(--music-text-dim);
            border-color: rgba(130, 155, 210, 0.20);
        }
        .light-theme .control-btn:hover,
        body.light-theme .control-btn:hover {
            background: rgba(37, 99, 235, 0.15);
            border-color: var(--music-accent);
            color: var(--music-accent);
            box-shadow: 0 0 16px rgba(37, 99, 235, 0.15);
        }

        .light-theme .play-btn,
        body.light-theme .play-btn {
            box-shadow: 0 2px 16px rgba(37, 99, 235, 0.30), 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        .light-theme .play-btn:hover,
        body.light-theme .play-btn:hover {
            box-shadow: 0 4px 24px rgba(37, 99, 235, 0.40), 0 4px 12px rgba(0, 0, 0, 0.10);
        }

        .light-theme .progress-bar,
        body.light-theme .progress-bar {
            background: rgba(130, 150, 200, 0.15);
        }
        .light-theme .progress-fill::after,
        body.light-theme .progress-fill::after {
            box-shadow: 0 0 8px rgba(37, 99, 235, 0.4);
        }

        .light-theme .songs-panel,
        body.light-theme .songs-panel {
            box-shadow:
                0 4px 24px rgba(100, 120, 190, 0.08),
                0 1px 3px rgba(100, 120, 190, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }
        .light-theme .songs-panel::-webkit-scrollbar-thumb,
        body.light-theme .songs-panel::-webkit-scrollbar-thumb {
            background: rgba(37, 99, 235, 0.22);
        }
        .light-theme .songs-panel::-webkit-scrollbar-thumb:hover,
        body.light-theme .songs-panel::-webkit-scrollbar-thumb:hover {
            background: rgba(37, 99, 235, 0.40);
        }

        .light-theme .playlist-selector,
        body.light-theme .playlist-selector {
            background: rgba(150, 165, 215, 0.06);
        }
        .light-theme .playlist-selector select,
        body.light-theme .playlist-selector select {
            background: rgba(150, 165, 215, 0.08);
        }
        .light-theme .playlist-selector select option,
        body.light-theme .playlist-selector select option {
            background: #f2f5fd;
            color: #1e293b;
        }

        .light-theme .song-item,
        body.light-theme .song-item {
            background: rgba(150, 165, 215, 0.04);
        }
        .light-theme .song-item:hover,
        body.light-theme .song-item:hover {
            background: rgba(37, 99, 235, 0.08);
            border-color: rgba(37, 99, 235, 0.25);
        }
        .light-theme .song-item.active,
        body.light-theme .song-item.active {
            background: linear-gradient(90deg, rgba(37, 99, 235, 0.10), rgba(79, 70, 229, 0.06));
            box-shadow: 0 0 12px rgba(37, 99, 235, 0.08);
        }

        .light-theme .song-item-icon,
        body.light-theme .song-item-icon {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.18), rgba(79, 70, 229, 0.14));
        }

        .light-theme .lyric-line.active,
        body.light-theme .lyric-line.active {
            color: #1e3a5f;
            text-shadow: none;
            background: linear-gradient(90deg, rgba(37, 99, 235, 0.12), rgba(79, 70, 229, 0.08), rgba(37, 99, 235, 0.12));
        }

        .light-theme .song-title,
        body.light-theme .song-title {
            color: #1e3a5f;
            text-shadow: none;
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 1100px) {
            .player-layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
                min-height: auto;
                gap: 16px;
            }
            .lyrics-container {
                grid-row: auto;
                max-height: 320px;
                padding: 24px 20px;
            }
            .songs-panel { max-height: 320px; }
            .music-player { padding: 20px 24px; }
            body::before, body::after { display: none; }
        }

        @media (max-width: 600px) {
            .player-layout { gap: 10px; }
            .lyrics-container {
                padding: 16px 14px;
                max-height: 240px;
            }
            .lyric-line { font-size: 14px; padding: 8px 10px; }
            .lyric-line.active { font-size: 15px; }
            .song-title { font-size: 18px; }
            .music-player { padding: 16px; }
            .songs-panel { padding: 12px; max-height: 260px; }
            .play-btn { width: 48px; height: 48px; }
            .control-btn { width: 36px; height: 36px; }
        }

        /* ============================================================
           PLAYLIST MANAGER — 播放列表管理页面
           Same proportions as player: lyrics (1fr) | controls (380px)
           ============================================================ */
        .playlist-manager {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
            min-height: calc(100vh - 240px);
            max-height: calc(100vh - 160px);
        }

        /* Left panel — matches lyrics-container sizing */
        .all-songs-panel {
            background: var(--music-surface);
            border-radius: var(--music-radius-lg);
            padding: 32px 36px;
            border: 1px solid var(--music-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);

    <script>
        // 导航配置
        const NAV_CONFIG = [
            { page: 'player', icon: 'fa-music', label: '音乐播放', active: true },
            { page: 'playlist', icon: 'fa-list-ul', label: '播放列表', active: false },
        ];

        // 音乐数据（从JSON加载）
        let songs = [];
        let lyricsCache = {};
        let playlists = [];

        // 播放器状态
        let currentSongIndex = 0;
        let isPlaying = false;
        let audioPlayer = document.getElementById('audioPlayer');
        let lyricsInterval = null;
        let pendingAutoPlay = false;

        // ============================================================
        // 播放列表数据存储 (localStorage)
        // ============================================================
        var STORE_KEY = 'musicPlaylistData';
        var playlistStore = null; // { playlists: [{ id, title, songs: [{id,title,artist}] }] }

        function getStore() {
            if (playlistStore) return playlistStore;
            try {
                var raw = localStorage.getItem(STORE_KEY);
                if (raw) { playlistStore = JSON.parse(raw); return playlistStore; }
            } catch(e) {}
            return null;
        }

        function saveStore(store) {
            playlistStore = store;
            localStorage.setItem(STORE_KEY, JSON.stringify(store));
        }

        // 首次加载：从JSON文件读取并写入localStorage
        async function initPlaylistStore() {
            var store = getStore();
            if (store && store.playlists && store.playlists.length > 0) {
                return store;
            }
            // 从JSON种子数据初始化
            store = { version: 1, playlists: [] };
            try {
                var indexResp = await fetch('data/music/playlist/music-index.json');
                var indexData = await indexResp.json();
                for (var i = 0; i < indexData.length; i++) {
                    var plInfo = indexData[i];
                    try {
                        var songsResp = await fetch(plInfo.file);
                        var songsData = await songsResp.json();
                        store.playlists.push({
                            id: plInfo.id,
                            title: plInfo.title,
                            songs: songsData.map(function(s, idx) {
                                return { id: idx + 1, title: s.title, artist: s.artist };
                            })
                        });
                    } catch(e) {
                        console.error('加载歌单失败:', plInfo.file, e);
                    }
                }
                saveStore(store);
            } catch(e) {
                console.error('初始化歌单存储失败:', e);
            }
            return store;
        }

        // 获取所有去重歌曲（按 artist+title 去重）
        function getAllUniqueSongs(store) {
            var seen = {};
            var result = [];
            var pls = store.playlists;
            for (var i = 0; i < pls.length; i++) {
                var songs = pls[i].songs;
                for (var j = 0; j < songs.length; j++) {
                    var s = songs[j];
                    var key = s.artist + '|' + s.title;
                    if (!seen[key]) {
                        seen[key] = true;
                        result.push({ id: result.length + 1, title: s.title, artist: s.artist });
                    }
                }
            }
            return result;
        }

        // 生成唯一ID
        function generateId() {
            return 'pl_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
        }

        // 根据 artist-title 命名规则构建文件路径
        function getSongPath(song) {
            return 'data/music/songs/' + song.artist + '-' + song.title + '.mp3';
        }
        function getSongPathOgg(song) {
            return 'data/music/songs/' + song.artist + '-' + song.title + '.ogg';
        }
        function getLyricPath(song) {
            return 'data/music/lyrics/' + song.artist + '-' + song.title + '.lrc';
        }
        function getLyricPathJson(song) {
            return 'data/music/lyrics/' + song.artist + '-' + song.title + '.json';
        }

        // 循环模式: 'list' | 'single' | 'random' | 'none'
        let loopMode = 'list';

            'none':   'fa-redo-alt',
            'list':   'fa-redo-alt',
            'single': 'fa-redo-alt',
            'random': 'fa-random'
        };
        var LOOP_TITLES = {
            'none':   '关闭循环',
            'list':   '列表循环',
            'single': '单曲循环',
            'random': '随机播放'
        };

        // DOM元素
        const currentSongTitle = document.getElementById('currentSongTitle');
        const currentSongArtist = document.getElementById('currentSongArtist');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const loopBtn = document.getElementById('loopBtn');
        const progressBar = document.getElementById('progressBar');

        const totalTime = document.getElementById('totalTime');

        // 从store加载歌单到播放器（播放页面使用）
        function loadPlaylistsFromStore() {
            var store = getStore();
            if (!store) return;

        // 根据歌单ID加载歌曲到播放器
        function loadSongsById(playlistId) {
            var store = getStore();
            if (!store) { songs = []; return; }
            for (var i = 0; i < store.playlists.length; i++) {
                if (store.playlists[i].id === playlistId) {
                    songs = store.playlists[i].songs;
                    return;
                }

        }

        // 解析LRC格式歌词
        function parseLRC(content) {
            const lyrics = [];
            const lines = content.split('\n');
            const lrcRegex = /\[(\d{2}):(\d{2})\.(\d{2,3})\](.+)/;

            lines.forEach(line => {
                const match = line.match(lrcRegex);
                if (match) {
                    const minutes = parseInt(match[1]);
                    const seconds = parseInt(match[2]);
                    const milliseconds = parseInt(match[3]);
                    const text = match[4].trim();

                    if (text) {
                        lyrics.push({
                            time: minutes * 60 + seconds + milliseconds / 1000,
                            text: text
                        });
                    }
                }
            });

            lyrics.sort((a, b) => a.time - b.time);

            return lyrics.length > 0 ? lyrics : [{ time: 0, text: '暂无歌词' }];
        }

        // 加载歌词（按需 + 缓存）- 支持LRC和JSON格式，.lrc优先，回退到.json
        async function loadLyrics(lyricFile) {
            if (lyricsCache[lyricFile]) return lyricsCache[lyricFile];
            try {
                const resp = await fetch(lyricFile);
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const content = await resp.text();

                let lyrics;
                if (lyricFile.endsWith('.lrc')) {
                    lyrics = parseLRC(content);
                } else {
                    try {
                        lyrics = JSON.parse(content);
                    } catch {
                        lyrics = [{ time: 0, text: '暂无歌词' }];
                    }
                }

                lyricsCache[lyricFile] = lyrics;
                return lyrics;
            } catch (e) {
                // .lrc 失败则尝试 .json 回退
                if (lyricFile.endsWith('.lrc')) {
                    var jsonPath = lyricFile.replace(/\.lrc$/, '.json');
                    if (!lyricsCache[jsonPath]) {
                        try {
                            var resp2 = await fetch(jsonPath);
                            if (resp2.ok) {
                                var content2 = await resp2.text();
                                var lyrics2;
                                try {
                                    lyrics2 = JSON.parse(content2);
                                } catch {
                                    lyrics2 = [{ time: 0, text: '暂无歌词' }];
                                }
                                lyricsCache[jsonPath] = lyrics2;
                                lyricsCache[lyricFile] = lyrics2; // 缓存到原key避免重复尝试
                                return lyrics2;
                            }
                        } catch (e2) { /* fall through */ }
                    }
                }
                console.error('加载歌词失败:', lyricFile, e);
                return [{ time: 0, text: '暂无歌词' }];
            }
        }


        // ============================================================
        // 播放列表管理页面
        // ============================================================
        var selectedPlaylistId = null;   // 当前选中的歌单ID
        var checkedSongs = {};           // { songKey: true } 选中的歌曲

        function getSongKey(s) { return s.artist + '|' + s.title; }

        // 渲染所有歌曲卡片（左列）
        function renderAllSongs(filterText) {
            var store = getStore();
            if (!store) return;
            var allSongs = getAllUniqueSongs(store);
            var container = document.getElementById('allSongsList');
            var searchText = (filterText || '').toLowerCase();
            var html = '<div class="song-cards-grid">';
            var visibleCount = 0;
            for (var i = 0; i < allSongs.length; i++) {
                var s = allSongs[i];
                if (searchText && s.title.toLowerCase().indexOf(searchText) === -1 && s.artist.toLowerCase().indexOf(searchText) === -1) {
                    continue;
                }
                visibleCount++;
                var key = getSongKey(s);
                var selClass = checkedSongs[key] ? ' selected' : '';
                html += '<div class="song-card' + selClass + '" data-song-key="' + key + '" data-title="' + s.title.replace(/"/g, '&quot;') + '" data-artist="' + s.artist.replace(/"/g, '&quot;') + '">' +
                    '<div class="song-card-icon"><i class="fas fa-music"></i></div>' +
                    '<div class="song-card-title">' + s.title + '</div>' +
                    '<div class="song-card-artist">' + s.artist + '</div>' +
                '</div>';
            }
            html += '</div>';
            if (visibleCount === 0) {
                html = '<div class="empty-state">' + (searchText ? '没有匹配的歌曲' : '暂无歌曲') + '</div>';
            }
            container.innerHTML = html;
            updateCheckedCount();
            updateAddButton();
            if (visibleCount > 0) bindSongCardClicks(container);
        }

        function bindSongCardClicks(container) {
            var cards = container.querySelectorAll('.song-card');
            for (var i = 0; i < cards.length; i++) {
                cards[i].addEventListener('click', function() {
                    var key = this.dataset.songKey;
                    if (checkedSongs[key]) {
                        delete checkedSongs[key];
                        this.classList.remove('selected');
                    } else {
                        checkedSongs[key] = { title: this.dataset.title, artist: this.dataset.artist };
                        this.classList.add('selected');
                    }
                    updateCheckedCount();
                    updateAddButton();
                });
            }
        }

        function updateCheckedCount() {
            var count = Object.keys(checkedSongs).length;
            document.getElementById('selectedCount').textContent = '已选 ' + count + ' 首';
        }

        function updateAddButton() {
            var btn = document.getElementById('addSongsBtn');
            btn.disabled = !selectedPlaylistId || Object.keys(checkedSongs).length === 0;
        }

        // 渲染歌单卡片列表（右列上方）
        function renderPlaylistCards() {
            var store = getStore();
            if (!store) return;
            var container = document.getElementById('playlistCardList');
            var pls = store.playlists;
            var html = '';
            for (var i = 0; i < pls.length; i++) {
                var pl = pls[i];
                var selClass = (pl.id === selectedPlaylistId) ? ' selected' : '';
                html += '<div class="playlist-card' + selClass + '" data-playlist-id="' + pl.id + '">' +
                    '<div class="playlist-card-info">' +
                        '<div class="playlist-card-title">' + pl.title + '</div>' +
                        '<div class="playlist-card-count">' + pl.songs.length + ' 首歌曲</div>' +
                    '</div>' +
                    '<button class="playlist-card-delete" data-delete-id="' + pl.id + '" title="删除歌单"><i class="fas fa-times"></i></button>' +
                '</div>';
            }
            if (pls.length === 0) {
                html = '<div class="empty-state">暂无播放列表</div>';
            }
            container.innerHTML = html;
            bindPlaylistCardEvents(container);
        }

        function bindPlaylistCardEvents(container) {
            var cards = container.querySelectorAll('.playlist-card');
            for (var i = 0; i < cards.length; i++) {
                cards[i].addEventListener('click', function(e) {
                    if (e.target.closest('.playlist-card-delete')) return;
                    selectedPlaylistId = this.dataset.playlistId;
                    checkedSongs = {};
                    renderAllPlaylistManager();
                });
            }
            var deleteBtns = container.querySelectorAll('.playlist-card-delete');
            for (var j = 0; j < deleteBtns.length; j++) {
                deleteBtns[j].addEventListener('click', function(e) {
                    e.stopPropagation();
                    deletePlaylistById(this.dataset.deleteId);
                });
            }
        }

        function deletePlaylistById(playlistId) {
            var store = getStore();
            if (!store) return;
            var pl = null;
            for (var i = 0; i < store.playlists.length; i++) {
                if (store.playlists[i].id === playlistId) { pl = store.playlists[i]; break; }
            }
            if (!pl) return;
            if (!confirm('确定要删除歌单 "' + pl.title + '" 吗？此操作不可恢复。')) return;
            store.playlists = store.playlists.filter(function(p) { return p.id !== playlistId; });
            saveStore(store);
            if (selectedPlaylistId === playlistId) {
                selectedPlaylistId = null;
                checkedSongs = {};
            }
            loadPlaylistsFromStore();
            if (playlists.length > 0 && songs.length === 0) {
                songs = playlists[0].songs;
                renderSongsList();
            }
            renderAllPlaylistManager();
        }

        function renderSelectedPlaylistSongs() {
            var header = document.getElementById('selectedPlaylistHeader');
            var nameEl = document.getElementById('selectedPlaylistName');
            var songsContainer = document.getElementById('selectedPlaylistSongs');
            var deleteBtn = document.getElementById('deletePlaylistBtn');

            if (!selectedPlaylistId) {
                header.style.display = 'none';
                deleteBtn.style.display = 'none';
                songsContainer.innerHTML = '<div class="empty-state">请选择一个播放列表</div>';
                return;
            }

            var store = getStore();
            if (!store) return;
            var pl = null;
            for (var i = 0; i < store.playlists.length; i++) {
                if (store.playlists[i].id === selectedPlaylistId) { pl = store.playlists[i]; break; }
            }
            if (!pl) {
                selectedPlaylistId = null;
                header.style.display = 'none';
                deleteBtn.style.display = 'none';
                songsContainer.innerHTML = '<div class="empty-state">歌单不存在</div>';
                return;
            }

            header.style.display = 'block';
            nameEl.textContent = pl.title;
            deleteBtn.style.display = 'block';

            if (pl.songs.length === 0) {
                songsContainer.innerHTML = '<div class="empty-state">此歌单暂无歌曲</div>';
                return;
            }

            var html = '';
            for (var j = 0; j < pl.songs.length; j++) {
                var s = pl.songs[j];
                html += '<div class="playlist-song-item">' +
                    '<div class="song-item-icon"><i class="fas fa-music"></i></div>' +
                    '<div class="song-item-info">' +
                        '<div class="song-item-title">' + s.title + '</div>' +
                        '<div class="song-item-artist">' + s.artist + '</div>' +
                    '</div>' +
                    '<button class="btn-danger" data-remove-id="' + s.id + '" title="移除歌曲"><i class="fas fa-times"></i></button>' +
                '</div>';

            bindRemoveSongButtons(songsContainer, pl.id);

        function bindRemoveSongButtons(container, playlistId) {
            var btns = container.querySelectorAll('.btn-danger');
            for (var i = 0; i < btns.length; i++) {
                btns[i].addEventListener('click', function() {
                    removeSongFromPlaylist(playlistId, parseInt(this.dataset.removeId));
                });
            }
        }

        function removeSongFromPlaylist(playlistId, songId) {
            var store = getStore();
            if (!store) return;
            for (var i = 0; i < store.playlists.length; i++) {
                if (store.playlists[i].id === playlistId) {
                    store.playlists[i].songs = store.playlists[i].songs.filter(function(s) { return s.id !== songId; });
                    break;
                }
            }
            // 重新分配歌曲ID
            for (var j = 0; j < store.playlists.length; j++) {
                if (store.playlists[j].id === playlistId) {
                    var plSongs = store.playlists[j].songs;
                    for (var k = 0; k < plSongs.length; k++) { plSongs[k].id = k + 1; }
                    break;
                }
            }
            saveStore(store);
            if (playlistSelect.value === playlistId) {
                loadSongsById(playlistId);
                renderSongsList();
            }
            loadPlaylistsFromStore();
            renderSelectedPlaylistSongs();
            renderPlaylistCards();
        }

        function addCheckedSongsToPlaylist() {
            if (!selectedPlaylistId) return;
            var keys = Object.keys(checkedSongs);
            if (keys.length === 0) return;
            var store = getStore();
            if (!store) return;
            var targetPl = null;
            for (var i = 0; i < store.playlists.length; i++) {
                if (store.playlists[i].id === selectedPlaylistId) { targetPl = store.playlists[i]; break; }
            }
            if (!targetPl) return;

            var maxId = 0;
            for (var j = 0; j < targetPl.songs.length; j++) {
                if (targetPl.songs[j].id > maxId) maxId = targetPl.songs[j].id;
            }

            var existing = {};
            for (var k = 0; k < targetPl.songs.length; k++) {
                existing[getSongKey(targetPl.songs[k])] = true;
            }

            var added = 0;
            for (var m = 0; m < keys.length; m++) {
                var song = checkedSongs[keys[m]];
                if (!existing[keys[m]]) {
                    existing[keys[m]] = true;
                    maxId++;
                    targetPl.songs.push({ id: maxId, title: song.title, artist: song.artist });
                    added++;
                }
            }

            if (added > 0) {
                saveStore(store);
                if (playlistSelect.value === selectedPlaylistId) {
                    loadSongsById(selectedPlaylistId);
                    renderSongsList();
                }
                loadPlaylistsFromStore();
            }

            checkedSongs = {};
            renderSelectedPlaylistSongs();
            renderPlaylistCards();
            renderAllSongs(document.getElementById('songSearch').value);
        }

        function createNewPlaylist() {
            var title = prompt('请输入新播放列表名称：');
            if (!title || !title.trim()) return;
            title = title.trim();
            var store = getStore();
            if (!store) return;
            store.playlists.push({ id: generateId(), title: title, songs: [] });
            saveStore(store);
            selectedPlaylistId = null;
            checkedSongs = {};
            loadPlaylistsFromStore();
            renderAllPlaylistManager();
        }

        function renderAllPlaylistManager() {
            renderPlaylistCards();
            renderSelectedPlaylistSongs();
            updateAddButton();
            updateCheckedCount();
        }

        function setupPlaylistManagerEvents() {
            document.getElementById('songSearch').addEventListener('input', function() {
                renderAllSongs(this.value);
            });
            document.getElementById('addSongsBtn').addEventListener('click', addCheckedSongsToPlaylist);
            document.getElementById('createPlaylistBtn').addEventListener('click', createNewPlaylist);
            document.getElementById('deletePlaylistBtn').addEventListener('click', function() {
                if (selectedPlaylistId) deletePlaylistById(selectedPlaylistId);
            });
        }

        function initPlaylistManager() {
            setupPlaylistManagerEvents();
            renderAllSongs('');
            renderAllPlaylistManager();
        }

        // 初始化
        async function init() {
            navLinks = document.querySelectorAll('.nav-link');
            pages = document.querySelectorAll('.page');
            syncThemeFromIndex();
            await initPlaylistStore();
            loadPlaylistsFromStore();
            renderSongsList();
            if (songs.length > 0) {
                await loadSong(0);
            }
            updateLoopButton();
            setupEventListeners();
            initPlaylistManager();
        }

        // 设置事件监听
        function setupEventListeners() {
            setupNavLinks(navLinks, pages, function(pageId) {
                if (pageId === 'playlist') {
                    renderAllPlaylistManager();
                    renderAllSongs(document.getElementById('songSearch').value);
                }
            });

            playlistSelect.addEventListener('change', function() {
                var selectedId = this.value;
                if (selectedId) {
                    isPlaying = false;
                    audioPlayer.pause();
                    playIcon.className = 'fas fa-play';
                    stopLyricsSync();

                    loadSongsById(selectedId);
                    currentSongIndex = 0;
                    if (songs.length > 0) {
                        loadSong(0);
                    }
                    renderSongsList();
                }
            });

            playBtn.addEventListener('click', togglePlay);
            prevBtn.addEventListener('click', playPrevSong);
            nextBtn.addEventListener('click', playNextSong);
            loopBtn.addEventListener('click', cycleLoopMode);

            progressBar.addEventListener('click', seekToPosition);

            audioPlayer.addEventListener('timeupdate', updateProgress);
            audioPlayer.addEventListener('ended', playNextSong);
            audioPlayer.addEventListener('loadedmetadata', updateTotalTime);
            // 扩展名回退：.mp3 加载失败则尝试 .ogg
            audioPlayer.addEventListener('error', function() {
                var song = songs[currentSongIndex];
                if (song && audioPlayer.src.indexOf('.mp3') !== -1) {
                    audioPlayer.src = getSongPathOgg(song);
                }
            });
        }

        // 加载歌曲（index: 歌曲序号, autoPlay: 是否加载完自动播放）
        async function loadSong(index, autoPlay) {
            if (!songs.length || index < 0 || index >= songs.length) return;

            currentSongIndex = index;
            var song = songs[currentSongIndex];

            currentSongTitle.textContent = song.title;
            currentSongArtist.textContent = song.artist;

            audioPlayer.src = getSongPath(song);

            var lyrics = await loadLyrics(getLyricPath(song));
            renderLyrics(lyrics);

            updateSongListActive();

            pendingAutoPlay = !!autoPlay;
        }

        audioPlayer.addEventListener('canplay', function() {
            if (pendingAutoPlay) {
                pendingAutoPlay = false;
                playSong();
            }
        });

        function togglePlay() {
            if (isPlaying) {
                pauseSong();
            } else {
                if (!audioPlayer.src || audioPlayer.src === window.location.href) {
                    loadSong(currentSongIndex, true);
                } else {
                    playSong();
                }
            }
        }

        function playSong() {
            audioPlayer.play()
                .then(() => {
                    isPlaying = true;
                    playIcon.className = 'fas fa-pause';
                    startLyricsSync();
                })
                .catch(error => {
                    console.error('播放失败:', error);
                    simulatePlayback();
                });
        }

        function pauseSong() {
            audioPlayer.pause();
            isPlaying = false;
            playIcon.className = 'fas fa-play';
            stopLyricsSync();
        }

        // 切换循环模式: list → single → random → none → list
        function cycleLoopMode() {
            var modes = ['list', 'single', 'random', 'none'];
            var idx = modes.indexOf(loopMode);
            loopMode = modes[(idx + 1) % modes.length];
            updateLoopButton();
        }

        function updateLoopButton() {
            loopBtn.className = 'control-btn loop-btn';
            if (loopMode === 'single') loopBtn.classList.add('single');
            if (loopMode === 'list') loopBtn.classList.add('list');
            if (loopMode === 'random') loopBtn.classList.add('random');
            loopBtn.innerHTML = '<i class="fas ' + LOOP_ICONS[loopMode] + '"></i>';
            loopBtn.title = LOOP_TITLES[loopMode];
        }

        function playNextSong() {
            var wasPlaying = isPlaying;
            if (isPlaying) pauseSong();
            var nextIndex;
            if (loopMode === 'single') {
                nextIndex = currentSongIndex;
            } else if (loopMode === 'random') {
                nextIndex = Math.floor(Math.random() * songs.length);
                if (songs.length > 1 && nextIndex === currentSongIndex) {
                    nextIndex = (nextIndex + 1) % songs.length;
                }
            } else if (loopMode === 'list') {
                nextIndex = (currentSongIndex + 1) % songs.length;
            } else {
                // 'none' — stop at end
                if (currentSongIndex >= songs.length - 1) return;
                nextIndex = currentSongIndex + 1;
            }
            loadSong(nextIndex, wasPlaying);
        }

        function playPrevSong() {
            var wasPlaying = isPlaying;
            if (isPlaying) pauseSong();
            var prevIndex = (currentSongIndex - 1 + songs.length) % songs.length;
            loadSong(prevIndex, wasPlaying);
        }

        function updateProgress() {
            const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progressFill.style.width = progress + '%';

            currentTime.textContent = formatTime(audioPlayer.currentTime);

            syncLyrics(audioPlayer.currentTime);
        }

        function updateTotalTime() {
            totalTime.textContent = formatTime(audioPlayer.duration);
        }

        function seekToPosition(event) {
            const progressBarWidth = progressBar.offsetWidth;
            const clickPosition = event.offsetX;
            const seekTime = (clickPosition / progressBarWidth) * audioPlayer.duration;

            audioPlayer.currentTime = seekTime;
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function renderLyrics(lyrics) {
            lyricsContent.innerHTML = '';
            lyrics.forEach((line, index) => {
                const lyricLine = document.createElement('div');
                lyricLine.className = 'lyric-line';
                lyricLine.textContent = line.text;
                lyricLine.dataset.time = line.time;
                lyricsContent.appendChild(lyricLine);
            });

            checkLyricsScroll();
        }

        function checkLyricsScroll() {
            const lyricsContainer = document.querySelector('.lyrics-container');
            const lyricsContent = document.getElementById('lyricsContent');

            lyricsContainer.classList.remove('scroll-x');

            setTimeout(() => {
                const contentWidth = lyricsContent.scrollWidth;
                const containerWidth = lyricsContainer.clientWidth - 50;

                if (contentWidth > containerWidth) {
                    lyricsContainer.classList.add('scroll-x');
                }
            }, 100);
        }

        function startLyricsSync() {
            stopLyricsSync();
            lyricsInterval = setInterval(() => {
                syncLyrics(audioPlayer.currentTime);
            }, 100);
        }

        function stopLyricsSync() {
            if (lyricsInterval) {
                clearInterval(lyricsInterval);
                lyricsInterval = null;
            }
        }

        function syncLyrics(currentTime) {
            const lyricLines = lyricsContent.querySelectorAll('.lyric-line');
            let activeLineIndex = -1;

            for (let i = lyricLines.length - 1; i >= 0; i--) {
                const lineTime = parseFloat(lyricLines[i].dataset.time);
                if (currentTime >= lineTime) {
                    activeLineIndex = i;
                    break;
                }
            }

            lyricLines.forEach((line, index) => {
                if (index === activeLineIndex) {
                    line.classList.add('active');
                    const container = document.querySelector('.lyrics-container');
                    const lineTop = line.offsetTop;
                    const containerHeight = container.offsetHeight;
                    const lineHeight = line.offsetHeight;
                    const scrollTop = lineTop - containerHeight / 2 + lineHeight / 2;

                    if (Math.abs(container.scrollTop - scrollTop) > lineHeight) {
                        container.scrollTo({
                            top: Math.max(0, scrollTop),
                            behavior: 'smooth'
                        });
                    }
                } else {
                    line.classList.remove('active');
                }
            });
        }

        function renderSongsList() {
            songsGrid.innerHTML = '';
            songs.forEach((song, index) => {
                const songItem = document.createElement('div');
                songItem.className = 'song-item';
                if (index === currentSongIndex) songItem.classList.add('active');
                songItem.dataset.index = index;
                songItem.innerHTML =
                    '<div class="song-item-icon"><i class="fas fa-music"></i></div>' +
                    '<div class="song-item-info">' +
                        '<div class="song-item-title">' + song.title + '</div>' +
                        '<div class="song-item-artist">' + song.artist + '</div>' +
                    '</div>' +
                    '<div class="song-item-duration">' + (song.duration || '') + '</div>';

                songItem.addEventListener('click', function() {
                    if (isPlaying) pauseSong();
                    loadSong(index, true);
                });

                songsGrid.appendChild(songItem);
            });
        }

        function updateSongListActive() {
            var items = songsGrid.querySelectorAll('.song-item');
            items.forEach(function(item, i) {
                item.classList.toggle('active', i === currentSongIndex);
            });
        }

        function simulatePlayback() {
            isPlaying = true;
            playIcon.className = 'fas fa-pause';

            let simulatedTime = 0;
            const simulateInterval = setInterval(() => {
                simulatedTime += 0.1;
                if (simulatedTime > 15) {
                    clearInterval(simulateInterval);
                    playNextSong();
                    return;
                }

                const progress = (simulatedTime / 15) * 100;
                progressFill.style.width = progress + '%';
                currentTime.textContent = formatTime(simulatedTime);
                totalTime.textContent = '2:30';

                syncLyrics(simulatedTime);
            }, 100);

            window.simulateInterval = simulateInterval;
        }

        // 初始化应用
        (function() {
            injectNav(NAV_CONFIG);
            injectFooter();
            injectAssistant();
            setupHomeLink('homeLink', 'index.html');
            initLearningAssistant();
            init();
        })();
    </script>
</body>
